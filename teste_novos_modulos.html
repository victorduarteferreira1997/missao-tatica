    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .timer-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
        
        .modal-enter { animation: modalFadeIn 0.25s ease-out forwards; }
        @keyframes modalFadeIn { 
            from { opacity: 0; transform: scale(0.95) translateY(10px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }
        
        .float-text {
            position: fixed; pointer-events: none; animation: floatUp 1.2s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.5); z-index: 100;
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-60px) scale(1); }
        }

        .toast-enter { animation: slideInRight 0.4s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { 
            from { transform: translateX(100%); opacity: 0; } 
            to { transform: translateX(0); opacity: 1; } 
        }

        .task-drag-over {
            outline: 2px dashed rgba(34, 211, 238, 0.75);
            outline-offset: 4px;
            background: rgba(8, 47, 73, 0.45) !important;
        }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
    </style>
</head>

        const DEFAULT_RECHARGE_ACTIONS = [

            { id: 'cochilo-curto', title: 'Cochilo curto', icon: 'bed', description: 'Descanso breve para recuperar alerta sem transformar a tarde em hibernação.', energyGain: 35, duration: 20, xp: 0, type: 'nap', isDefault: true, active: true },
            { id: 'caminhada-leve', title: 'Caminhada leve', icon: 'footprints', description: 'Movimento leve para oxigenar, mudar contexto e baixar tensão acumulada.', energyGain: 20, duration: 10, xp: 0, type: 'movement', isDefault: true, active: true },
            { id: 'alongamento-mobilidade', title: 'Alongamento rápido', icon: 'accessibility', description: 'Soltar pescoço, ombros, lombar e respiração antes de voltar ao foco.', energyGain: 15, duration: 7, xp: 0, type: 'movement', isDefault: true, active: true },

            { id: 'luz-natural', title: 'Luz natural', icon: 'sun', description: 'Alguns minutos de claridade natural para sinalizar vigília e quebrar a inércia.', energyGain: 10, duration: 5, xp: 0, type: 'environment', isDefault: true, active: true },
            { id: 'oracao-meditacao', title: 'Oração ou meditação', icon: 'sparkles', description: 'Silêncio, presença e respiração para recuperar direção antes da próxima missão.', energyGain: 14, duration: 8, xp: 0, type: 'mental', isDefault: true, active: true }

        // Função definida cedo para evitar crash no validateState quando já existem tarefas salvas.
        window.getTaskCategory = function(categoryId) {
            const cat = state?.taskCategories?.find(c => c.id === categoryId) || DEFAULT_TASK_CATEGORIES.find(c => c.id === categoryId);
            return cat || { id: categoryId || 'default', label: categoryId || 'Geral', icon: ICONS[categoryId] || ICONS.default, color: 'text-slate-400', active: true };
        };

        function getCorrectLevel(currentXp) {
            let correctLevel = 1;
            for (let i = 0; i < RANKS.length; i++) {
                if (currentXp >= RANKS[i].max) correctLevel = RANKS[i].level + 1;
                else break;
            }
            return Math.min(correctLevel, RANKS.length);
        }

        window.validateState = function() {
            if (!state) {
                state = {
                    activeTab: 'monday', focusMode: false, focusedTaskId: null,
                    xp: 0, level: 1, energy: 100, waterCount: 0, coins: 0, combo: 0,
                    unlockedBadges: [], tasks: [], quickTasks: [], currentFilter: 'all', taskCategories: DEFAULT_TASK_CATEGORIES.map(c => ({...c})),
                    pomodoroSettings: { focus: 25, shortBreak: 5, longBreak: 15, cycles: 4 },
                    focusData: { cycles: [] },
                    rechargeData: { actions: DEFAULT_RECHARGE_ACTIONS.map(a => ({...a})), logs: [] },
                    stats: { pomodorosCompleted: 0, tasksMoved: 0, maxComboReached: 0, rewardsBought: 0 }
                };
            }
            if (!state.stats) state.stats = { pomodorosCompleted: 0, tasksMoved: 0, maxComboReached: 0, rewardsBought: 0 };
            if (!state.quickTasks) state.quickTasks = [];
            if (!state.unlockedBadges) state.unlockedBadges = [];
            if (!state.tasks) state.tasks = []; 
            if (!state.currentFilter) state.currentFilter = 'all';
            if (!Array.isArray(state.deletedTaskCategoryIds)) state.deletedTaskCategoryIds = [];
            if (!state.taskCategories || !Array.isArray(state.taskCategories)) state.taskCategories = [];
            if (state.taskCategories.length === 0) {
                state.taskCategories = DEFAULT_TASK_CATEGORIES
                    .filter(c => !state.deletedTaskCategoryIds.includes(c.id))
                    .map(c => ({...c}));
            } else {
                DEFAULT_TASK_CATEGORIES.forEach(defaultCat => {
                    if (state.deletedTaskCategoryIds.includes(defaultCat.id)) return;
                    const existing = state.taskCategories.find(c => c.id === defaultCat.id);
                    if (!existing) state.taskCategories.push({...defaultCat});
                    else {
                        existing.label = existing.label || defaultCat.label;
                        existing.icon = existing.icon || defaultCat.icon;
                        existing.color = existing.color || defaultCat.color;
                        if (typeof existing.active === 'undefined') existing.active = true;
                        if (typeof existing.system === 'undefined') existing.system = true;
                    }
                });
            }
            if (!state.taskCategories.some(c => c.active !== false)) {
                state.taskCategories.push({ id: 'geral', label: 'Geral', icon: 'target', color: 'text-slate-400', active: true, system: false, createdAt: new Date().toISOString() });
            }
            daysOfWeek.forEach(day => {
                const tasksForDay = state.tasks
                    .filter(t => t.day === day.id)
                    .sort((a, b) => ((typeof a.order === 'number' ? a.order : 999999) - (typeof b.order === 'number' ? b.order : 999999)) || ((a.id || 0) - (b.id || 0)));
                tasksForDay.forEach((t, index) => { if (typeof t.order !== 'number') t.order = index + 1; });
            });
            state.tasks.forEach(t => { 
                if (!Array.isArray(t.subtasks)) t.subtasks = []; 
                if (!Array.isArray(t.recurrenceDays)) t.recurrenceDays = []; 
                if (typeof t.isRecurring === 'undefined') t.isRecurring = t.recurrenceDays.length > 0;
                // Não depender de window.getTaskCategory aqui: validateState roda antes de alguns helpers visuais.
                const categoryExistsForTask = state.taskCategories.some(c => c.id === t.category);
                if (!categoryExistsForTask) t.category = state.taskCategories.find(c => c.active !== false)?.id || 'geral';
            });
            if (state.currentFilter !== 'all' && !state.taskCategories.some(c => c.id === state.currentFilter && c.active !== false)) state.currentFilter = 'all';
            
            if (!state.customRewards) state.customRewards = [];
            if (!state.rewardPurchases) state.rewardPurchases = [];

            // Validação Módulo de Rituais
            if (!state.routineData) state.routineData = {};
            if (!state.routineData.rituals) state.routineData.rituals = [];
            if (!state.routineData.logs) state.routineData.logs = [];

            // Validação Módulo de Recarga Executiva
            if (!state.rechargeData) state.rechargeData = {};
            if (!Array.isArray(state.rechargeData.actions)) state.rechargeData.actions = [];
            if (!Array.isArray(state.rechargeData.logs)) state.rechargeData.logs = [];
            DEFAULT_RECHARGE_ACTIONS.forEach(defaultAction => {
                const existing = state.rechargeData.actions.find(a => a.id === defaultAction.id);
                if (!existing) {
                    state.rechargeData.actions.push({ ...defaultAction });
                } else {
                    existing.title = existing.title || defaultAction.title;
                    existing.icon = existing.icon || defaultAction.icon;
                    existing.description = existing.description || defaultAction.description;
                    existing.type = existing.type || defaultAction.type;
                    existing.duration = Number.isFinite(Number(existing.duration)) ? Number(existing.duration) : defaultAction.duration;

        window.unlockBadge = function(badgeId) {

        window.getCurrentlyQualifiedBadgeIds = function() {
            const activeBadges = [];
            if (state.tasks.length > 0 && state.tasks.some(t => t.completed)) activeBadges.push('primeiro_sangue');
            if (state.waterCount >= 5) activeBadges.push('oasis');

            if (state.stats.rewardsBought >= 1) activeBadges.push('shopaholic');

            if (state.tasks.filter(t => t.completed && t.category === 'law').length >= 3) activeBadges.push('legal_eagle');
            if (state.tasks.filter(t => t.completed && t.category === 'home').length >= 3) activeBadges.push('home_architect');
            if (state.waterCount >= 10) activeBadges.push('hydro_god');
            if (state.stats.pomodorosCompleted >= 4) activeBadges.push('deep_focus');

            let perfectDayCompleted = false;

            if (state.studyData?.reviews?.filter(r => r.status === 'archived').length >= 1) activeBadges.push('arquivo_organizado');

            const hasFinanceData = (state.financeData?.incomes?.length > 0 || state.financeData?.fixedExpenses?.length > 0 || state.financeData?.variableExpenses?.length > 0 || state.financeData?.moneyJournal?.length > 0);
            if (hasFinanceData) activeBadges.push('tesoureiro_tatico');

        window.rollbackTaskBadges = function(task) {
            const badgeIds = Array.isArray(task?.rewardedBadgeIds) ? task.rewardedBadgeIds : [];
            if (badgeIds.length === 0) return;

            const stillQualified = window.getCurrentlyQualifiedBadgeIds();
            const badgesToRemove = badgeIds.filter(badgeId => !stillQualified.includes(badgeId));
            if (badgesToRemove.length > 0) {
                state.unlockedBadges = state.unlockedBadges.filter(badgeId => !badgesToRemove.includes(badgeId));
                state.xp = Math.max(0, state.xp - (badgesToRemove.length * 100));
                state.coins = Math.max(0, state.coins - (badgesToRemove.length * 50));
                if (typeof getCorrectLevel === 'function') state.level = getCorrectLevel(state.xp);
                const names = badgesToRemove.map(id => BADGES_DB.find(b => b.id === id)?.title || id).join(', ');
                window.showToast('Conquista revertida', `${names}. A medalha saiu porque a missão foi desmarcada.`, 'rotate-ccw', 'text-orange-400');
            }
            task.rewardedBadgeIds = [];
        };

        window.checkGameTriggers = function() {
            const activeBadges = window.getCurrentlyQualifiedBadgeIds();
            const toUnlock = activeBadges.filter(b => !state.unlockedBadges.includes(b));
            toUnlock.forEach(badgeId => window.unlockBadge(badgeId));
            if (state.combo > (state.stats.maxComboReached || 0)) state.stats.maxComboReached = state.combo;

        window.getComboMultiplier = function() { return state.combo === 0 ? 1 : 1 + (state.combo * 0.1); };

        window.getXpForCurrentLevel = function() { return (RANKS.find(r => r.level === state.level) || RANKS[RANKS.length - 1]).max; };
        window.getRankName = function(lvl = state.level) { return (RANKS.find(r => r.level === lvl) || RANKS[RANKS.length - 1]).name; };

        window.checkLevelUp = function() {
            let nextMax = window.getXpForCurrentLevel(); let levelChanged = false;
            while (state.xp >= nextMax && state.level < RANKS.length) { state.level += 1; nextMax = window.getXpForCurrentLevel(); levelChanged = true; }
            if (levelChanged) { state.energy = Math.min(100, state.energy + 50); uiState.showLevelUp = true; setTimeout(() => { uiState.showLevelUp = false; render(); }, 4000); }

        window.changeEnergy = function(amount) {

        window.toggleTask = function(taskId, event) {
            const task = state.tasks.find(t => t.id == taskId);
            if (!task) return;

            if (task.completed) {
                task.completed = false; task.skipped = false;
                const deductedXp = task.rewardedXp || task.xp; const deductedCoins = task.rewardedCoins || Math.round(task.xp * 0.2);
                const energyToRestore = typeof task.rewardedEnergyCost === 'number' ? task.rewardedEnergyCost : task.energyCost;
                state.xp = Math.max(0, state.xp - deductedXp); state.coins = Math.max(0, state.coins - deductedCoins);
                window.changeEnergy(energyToRestore); state.combo = Math.max(0, state.combo - 1);
                window.rollbackTaskBadges(task);
                if (typeof getCorrectLevel === 'function') state.level = getCorrectLevel(state.xp);
                window.spawnFloatingText(event, `-${deductedXp} XP`, 'text-red-400');
            } else {
                const badgesBefore = [...state.unlockedBadges];
                const multiplier = window.getComboMultiplier(); const finalXp = Math.round(task.xp * multiplier); const earnedCoins = Math.round(finalXp * 0.2); 
                task.completed = true; task.rewardedXp = finalXp; task.rewardedCoins = earnedCoins; task.rewardedEnergyCost = task.energyCost; 
                state.xp += finalXp; state.coins += earnedCoins; window.changeEnergy(-task.energyCost); state.combo += 1;
                window.checkGameTriggers();
                task.rewardedBadgeIds = state.unlockedBadges.filter(badgeId => !badgesBefore.includes(badgeId));
                window.spawnFloatingText(event, `+${finalXp} XP`, 'text-indigo-400');
            }
            window.checkLevelUp(); window.saveState();
        };

        window.handleTaskDragStart = function(taskId, event) {
            if (!event || !event.dataTransfer) return;
            event.stopPropagation();
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', String(taskId));
            event.currentTarget.classList.add('opacity-60');
        };

        window.handleTaskDragEnd = function(event) {
            if (event?.currentTarget) event.currentTarget.classList.remove('opacity-60');
            document.querySelectorAll('.task-drag-over').forEach(el => el.classList.remove('task-drag-over'));
        };

        window.handleTaskDragOver = function(taskId, event) {
            if (!event) return;
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            if (event.currentTarget) event.currentTarget.classList.add('task-drag-over');
        };

        window.handleTaskDragLeave = function(event) {
            if (event?.currentTarget) event.currentTarget.classList.remove('task-drag-over');
        };

        window.handleTaskDrop = function(targetTaskId, event) {
            if (!event || !event.dataTransfer) return;
            event.preventDefault();
            event.stopPropagation();
            if (event.currentTarget) event.currentTarget.classList.remove('task-drag-over');
            const draggedTaskId = event.dataTransfer.getData('text/plain');
            if (!draggedTaskId || String(draggedTaskId) === String(targetTaskId)) return;
            const dragged = state.tasks.find(t => String(t.id) === String(draggedTaskId));
            const target = state.tasks.find(t => String(t.id) === String(targetTaskId));
            if (!dragged || !target) return;
            dragged.day = target.day;
            const ordered = window.sortTasksForDay(target.day).filter(t => String(t.id) !== String(dragged.id));
            const targetIndex = ordered.findIndex(t => String(t.id) === String(target.id));
            ordered.splice(targetIndex < 0 ? ordered.length : targetIndex, 0, dragged);
            ordered.forEach((t, index) => { t.order = index + 1; });
            window.saveState();
            window.showToast('Ordem atualizada', 'Missões reorganizadas no dia.', 'grip-vertical', 'text-cyan-400');
        };

        window.moveTaskOrder = function(taskId, direction, event) {
            if (event) event.stopPropagation();
            const task = state.tasks.find(t => t.id == taskId);
            if (!task) return;
            const ordered = window.sortTasksForDay(task.day);
            const index = ordered.findIndex(t => t.id == taskId);
            const nextIndex = index + direction;
            if (index < 0 || nextIndex < 0 || nextIndex >= ordered.length) return;
            const [item] = ordered.splice(index, 1);
            ordered.splice(nextIndex, 0, item);
            ordered.forEach((t, i) => { t.order = i + 1; });
            window.saveState();
        };

        window.findTaskByExactId = function(taskId) {

        window.getCurrentFocusTargetTask = function() {
            const dayTasks = state.tasks.filter(t => t.day === state.activeTab);
            const targetTasks = state.currentFilter === 'all' ? dayTasks : dayTasks.filter(t => t.category === state.currentFilter);
            return (window.findTaskByExactId(state.focusedTaskId) && !window.findTaskByExactId(state.focusedTaskId).completed && window.findTaskByExactId(state.focusedTaskId).day === state.activeTab)

                : (targetTasks.find(t => !t.completed) || null);

        window.getPomodoroLockedTask = function(taskIdFromButton = null) {
            let lockedTask = null;

            // Prioridade máxima: o valor EXATO selecionado no dropdown.
            // Não usar parseInt aqui, porque IDs de tarefas podem ter casas decimais.
            // parseInt cortava o ID e fazia o Pomodoro cair em outra tarefa.
            const selectEl = document.getElementById('pomodoro-focused-task-select');
            const selectedId = selectEl ? selectEl.value : '';
            lockedTask = window.findTaskByExactId(selectedId);

            // Fallback: id passado pelo botão, usado apenas quando não houver dropdown.
            if (!lockedTask && taskIdFromButton !== null && typeof taskIdFromButton !== 'undefined' && taskIdFromButton !== '') {
                lockedTask = window.findTaskByExactId(taskIdFromButton);
            }

            // Último fallback: regra antiga do alvo atual.
            if (!lockedTask && window.getCurrentFocusTargetTask) lockedTask = window.getCurrentFocusTargetTask();
            return lockedTask || null;
        };

        window.togglePomodoro = function(taskIdFromButton = null) {
            if (pomodoro.isRunning) { 
                clearInterval(pomodoro.intervalId); 
                pomodoro.isRunning = false; 
            } else { 
                pomodoro.isRunning = true; 
                if (pomodoro.mode === 'focus' && !pomodoro.currentFocusStartedAt) {
                    pomodoro.currentFocusStartedAt = new Date().toISOString();
                    const lockedTask = window.getPomodoroLockedTask(taskIdFromButton);
                    const lockedId = lockedTask ? String(lockedTask.id) : null;
                    pomodoro.currentFocusTaskId = lockedId;
                    pomodoro.currentFocusTaskText = lockedTask ? lockedTask.text : null;
                    pomodoro.currentFocusTaskDay = lockedTask ? lockedTask.day : null;
                    pomodoro.currentFocusTaskCategory = lockedTask ? lockedTask.category : null;
                    pomodoro.focusLock = lockedTask ? {
                        id: lockedId,
                        text: lockedTask.text,
                        day: lockedTask.day,
                        category: lockedTask.category,
                        lockedAt: new Date().toISOString()
                    } : null;
                }
                pomodoro.intervalId = setInterval(() => { 
                    if (pomodoro.timeLeft > 0) { 
                        pomodoro.timeLeft--; 
                        const display = document.getElementById('pomodoro-display'); 
                        if (display) display.innerText = window.formatTime(pomodoro.timeLeft); 
                    } else { 
                        window.handlePomodoroEnd(); 
                    } 
                }, 1000); 
            }
            render();
        };

        window.handlePomodoroEnd = function() {
            clearInterval(pomodoro.intervalId); 
            pomodoro.isRunning = false; 
            try { new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play(); } catch(e) {}
            const s = state.pomodoroSettings;
            if (pomodoro.mode === 'focus') {
                const focusMinutes = parseInt(s.focus) || 25;
                const activeFocusLock = pomodoro.focusLock || null;
                const lockedTaskId = activeFocusLock ? activeFocusLock.id : pomodoro.currentFocusTaskId;
                const lockedTaskText = activeFocusLock ? activeFocusLock.text : pomodoro.currentFocusTaskText;
                const hasLockedTask = lockedTaskId !== null && typeof lockedTaskId !== 'undefined' && lockedTaskId !== '';
                const focusedTask = hasLockedTask ? (window.findTaskByExactId(lockedTaskId) || null) : null;
                const fallbackTask = !hasLockedTask && window.getCurrentFocusTargetTask ? window.getCurrentFocusTargetTask() : null;
                const finalTaskId = hasLockedTask ? String(lockedTaskId) : (fallbackTask ? String(fallbackTask.id) : null);
                const finalTaskText = lockedTaskText || (focusedTask ? focusedTask.text : (fallbackTask ? fallbackTask.text : 'Ciclo sem tarefa vinculada'));
                const startedAt = pomodoro.currentFocusStartedAt || new Date(Date.now() - (focusMinutes * 60000)).toISOString();

                if (pomodoro.cycle % s.cycles === 0) { 
                    pomodoro.mode = 'longBreak'; 
                    pomodoro.timeLeft = s.longBreak * 60; 
                } else { 
                    pomodoro.mode = 'shortBreak'; 
                    pomodoro.timeLeft = s.shortBreak * 60; 
                }
                const earnedXP = 30 * window.getComboMultiplier(); 
                const earnedCoins = 10;
                state.xp += Math.round(earnedXP); 
                state.coins += earnedCoins; 
                state.stats.pomodorosCompleted = (state.stats.pomodorosCompleted || 0) + 1; 
                window.changeEnergy(-5); 
                pomodoro.currentFocusStartedAt = null;
                pomodoro.currentFocusTaskId = null;
                pomodoro.currentFocusTaskText = null;
                pomodoro.currentFocusTaskDay = null;
                pomodoro.currentFocusTaskCategory = null;
                pomodoro.focusLock = null;

                uiState.pomodoroEvaluationData = {
                    id: Date.now(),
                    date: new Date().toISOString(),
                    startedAt,
                    completedAt: new Date().toISOString(),
                    taskId: finalTaskId,
                    taskText: finalTaskText,
                    focusMinutes,
                    cycleNumber: pomodoro.cycle
                };
                uiState.customPrompt = { show: true, type: 'pomodoroEvaluation', reviewId: null };

                window.showToast('Foco Concluído!', `+${Math.round(earnedXP)} XP. Avalie a eficiência do ciclo.`, 'target', 'text-yellow-400'); 
                window.checkGameTriggers(); 
                window.checkLevelUp();
            } else {
                const wasLongBreak = pomodoro.mode === 'longBreak';
                pomodoro.mode = 'focus'; 
                pomodoro.timeLeft = s.focus * 60;
                pomodoro.currentFocusStartedAt = null;
                pomodoro.currentFocusTaskId = null;
                pomodoro.currentFocusTaskText = null;
                pomodoro.currentFocusTaskDay = null;
                pomodoro.currentFocusTaskCategory = null;
                pomodoro.focusLock = null;
                if (wasLongBreak) pomodoro.cycle = 1; else pomodoro.cycle++;
                window.changeEnergy(wasLongBreak ? 20 : 5);
            }
            window.saveState();
        };

        window.resetPomodoro = function() {

        window.savePomodoroSettings = function() {
            if (pomodoro.isRunning) {
                window.showAlertModal('Pause ou reinicie o Pomodoro antes de alterar os tempos.');
                return;
            }
            const focus = Math.max(1, Math.min(180, parseInt(document.getElementById('pomo-focus-min')?.value) || 25));
            const shortBreak = Math.max(1, Math.min(60, parseInt(document.getElementById('pomo-short-min')?.value) || 5));
            const cycles = Math.max(1, Math.min(12, parseInt(document.getElementById('pomo-cycles-long')?.value) || 4));
            const longBreak = Math.max(1, Math.min(120, parseInt(document.getElementById('pomo-long-min')?.value) || 15));
            state.pomodoroSettings = { focus, shortBreak, longBreak, cycles };
            pomodoro.mode = 'focus';
            pomodoro.cycle = 1;
            pomodoro.currentFocusStartedAt = null;
            pomodoro.currentFocusTaskId = null;
            pomodoro.currentFocusTaskText = null;
                pomodoro.currentFocusTaskDay = null;
                pomodoro.currentFocusTaskCategory = null;
            pomodoro.focusLock = null;
            pomodoro.timeLeft = focus * 60;
            window.showToast('Pomodoro atualizado', 'Novos tempos aplicados ao próximo ciclo.', 'settings', 'text-yellow-400');
            window.saveState();
        };

        window.calculatePomodoroEfficiency = function(focusRating, distractions) {
            const rating = Math.max(1, Math.min(5, parseInt(focusRating) || 3));
            const dist = Math.max(0, parseInt(distractions) || 0);
            return Math.max(0, Math.min(100, Math.round((rating * 20) - (dist * 7))));
        };

        window.savePomodoroEvaluation = function() {
            const data = uiState.pomodoroEvaluationData;
            if (!data) { window.skipPomodoroEvaluation(); return; }
            const focusRating = Math.max(1, Math.min(5, parseInt(document.getElementById('pomo-eval-focus')?.value) || 3));
            const distractions = Math.max(0, parseInt(document.getElementById('pomo-eval-distractions')?.value) || 0);
            const notes = document.getElementById('pomo-eval-notes')?.value.trim() || '';
            const efficiency = window.calculatePomodoroEfficiency(focusRating, distractions);
            if (!state.focusData) state.focusData = { cycles: [] };
            if (!Array.isArray(state.focusData.cycles)) state.focusData.cycles = [];
            state.focusData.cycles.push({
                ...data,
                focusRating,
                distractions,
                notes,
                efficiency
            });
            uiState.pomodoroEvaluationData = null;
            uiState.customPrompt = { show: false, type: '', reviewId: null };
            window.showToast('Eficiência registrada', `${efficiency}% de foco no ciclo.`, 'bar-chart-3', efficiency >= 75 ? 'text-emerald-400' : (efficiency >= 50 ? 'text-yellow-400' : 'text-orange-400'));
            window.saveState();
        };

        window.skipPomodoroEvaluation = function() {
            uiState.pomodoroEvaluationData = null;
            uiState.customPrompt = { show: false, type: '', reviewId: null };
            window.saveState();
        };

        window.getFocusEfficiencyByTask = function() {
            const cycles = (state.focusData && Array.isArray(state.focusData.cycles)) ? state.focusData.cycles : [];
            const grouped = {};
            cycles.forEach(c => {
                const key = c.taskId ? `task_${c.taskId}` : `text_${c.taskText || 'sem_tarefa'}`;
                if (!grouped[key]) grouped[key] = { taskText: c.taskText || 'Ciclo sem tarefa', total: 0, count: 0, lastDate: c.date };
                grouped[key].total += parseInt(c.efficiency) || 0;
                grouped[key].count += 1;
                if (!grouped[key].lastDate || new Date(c.date) > new Date(grouped[key].lastDate)) grouped[key].lastDate = c.date;
            });
            return Object.values(grouped)
                .map(g => ({ ...g, avg: Math.round(g.total / Math.max(1, g.count)) }))
                .sort((a, b) => new Date(b.lastDate) - new Date(a.lastDate))
                .slice(0, 8);
        };

        window.drinkWater = function(event) { state.waterCount++; window.changeEnergy(10); state.xp += 15; window.spawnFloatingText(event, `+10 HP`, 'text-emerald-400'); window.checkGameTriggers(); window.checkLevelUp(); window.saveState(); }

            const text = document.getElementById('et-text')?.value.trim();
            if (!text) { window.showAlertModal('Título vazio.'); return; }
            const oldDay = task.day;
            const newDay = document.getElementById('et-day')?.value || task.day || state.activeTab;
            const activeCategories = window.getTaskCategories();
            const selectedCategory = document.getElementById('et-category')?.value || activeCategories[0]?.id || task.category || 'geral';
            const priority = document.getElementById('et-priority')?.value || task.priority || 'media';
            const complexity = parseInt(document.getElementById('et-complexity')?.value, 10) || 1;
            const timeVal = parseInt(document.getElementById('et-time')?.value, 10) || 30;
            const impactType = document.getElementById('et-impact-type')?.value || 'drain';
            const cost = window.calculateTaskCost(priority, complexity, timeVal, impactType);
            const recurrenceDays = daysOfWeek
                .filter(d => document.getElementById(`et-repeat-${d.id}`)?.checked)
                .map(d => d.id);
            const isRecurring = recurrenceDays.length > 0;

            task.complexity = complexity;
            task.time = `${timeVal} min`;

            task.isRecurring = isRecurring;
            task.recurrenceDays = isRecurring ? [...recurrenceDays] : [];
            if (isRecurring && !task.recurrenceGroupId) task.recurrenceGroupId = `rec-${Date.now()}-${Math.random().toString(16).slice(2)}`;
            if (!isRecurring) delete task.recurrenceGroupId;
            if (oldDay !== newDay) {
                task.order = window.getNextTaskOrder(newDay);

        window.calculateTaskCost = function(priority, complexity, time, impactType) {
            const prioMult = { 'essencial': 1.5, 'alta': 1.2, 'media': 1.0, 'baixa': 0.8 }[priority] || 1.0;
            const compVal = parseInt(complexity) || 1; const timeVal = parseInt(time) || 15;
            let calcXp = Math.round((20 + (compVal * 15) + (timeVal * 1.5)) * prioMult);
            let calcHp = Math.round((compVal * 5) + (timeVal * 0.4));
            if(priority === 'essencial') calcHp = Math.round(calcHp * 0.8);
            if(priority === 'baixa') calcHp = Math.round(calcHp * 1.2); 
            calcHp = Math.min(calcHp, 60); if (impactType === 'recharge') calcHp = -Math.round(calcHp * 0.8); 
            return { xp: calcXp, hp: calcHp };
        };

        window.getRechargeActions = function() {
            if (!state.rechargeData) state.rechargeData = { actions: [], logs: [] };
            if (!Array.isArray(state.rechargeData.actions)) state.rechargeData.actions = [];
            return state.rechargeData.actions
                .filter(action => action.active !== false)

        window.useRechargeAction = function(actionId) {
            const action = state.rechargeData?.actions?.find(a => String(a.id) === String(actionId) && a.active !== false);
            if (!action) { window.showAlertModal('Recarga não encontrada.'); return; }

            const energyGain = Math.max(0, Math.min(100, parseInt(action.energyGain, 10) || 0));
            const xpGain = Math.max(0, Math.min(100, parseInt(action.xp, 10) || 0));
            const duration = Math.max(1, Math.min(240, parseInt(action.duration, 10) || 5));
            const beforeEnergy = state.energy;

            if (energyGain > 0 && beforeEnergy >= 100) {
                window.showAlertModal('Sua Bateria Executiva já está em 100%. Use a recarga quando houver desgaste real.');
                return;
            }

            window.changeEnergy(energyGain);
            const afterEnergy = state.energy;
            if (xpGain > 0) {
                state.xp += xpGain;
                window.checkLevelUp();
            }

            state.rechargeData.logs.push({
                id: Date.now(),
                actionId: action.id,
                title: action.title,
                type: action.type || 'custom',
                duration,
                energyGainPlanned: energyGain,
                energyGainApplied: Math.max(0, afterEnergy - beforeEnergy),
                xpAwarded: xpGain,
                beforeEnergy,
                afterEnergy,
                date: new Date().toISOString()
            });

            window.saveState();
            window.showToast('Bateria recarregada', `+${Math.max(0, afterEnergy - beforeEnergy)} HP registrado.`, action.icon || 'battery-charging', 'text-emerald-400');
        };

        window.addRechargeAction = function() {
            const title = document.getElementById('recharge-title')?.value.trim();
            const description = document.getElementById('recharge-desc')?.value.trim() || 'Recarga personalizada para recuperar bateria executiva.';
            const icon = document.getElementById('recharge-icon')?.value || 'battery-charging';
            let energyGain = parseInt(document.getElementById('recharge-energy')?.value, 10);
            let duration = parseInt(document.getElementById('recharge-duration')?.value, 10);
            let xp = parseInt(document.getElementById('recharge-xp')?.value, 10);

            if (!title) { window.showAlertModal('Nome da recarga é obrigatório.'); return; }
            if (isNaN(energyGain)) energyGain = 10;
            if (isNaN(duration)) duration = 5;
            if (isNaN(xp)) xp = 0;

            energyGain = Math.max(1, Math.min(100, energyGain));
            duration = Math.max(1, Math.min(240, duration));
            xp = Math.max(0, Math.min(100, xp));

            state.rechargeData.actions.push({
                id: `custom-recharge-${Date.now()}`,
                title,
                description,
                icon,
                energyGain,
                duration,
                xp,
                type: 'custom',
                active: true,
                isDefault: false,
                createdAt: new Date().toISOString()
            });

            window.saveState();
            window.showToast('Recarga criada', 'Nova opção adicionada ao Arsenal de Energia.', 'battery-charging', 'text-emerald-400');
        };

            const action = state.rechargeData?.actions?.find(a => String(a.id) === String(actionId));

                ? `Remover "${action.title}" do painel? Você pode recuperar os padrões futuramente em uma nova versão.`

                action.active = false;
                window.saveState();

        window.addRitual = function() {
            const title = document.getElementById('ritual-title')?.value.trim();
            const period = document.getElementById('ritual-period')?.value || 'morning';
            let xp = parseInt(document.getElementById('ritual-xp')?.value, 10);
            let energyDelta = parseInt(document.getElementById('ritual-energy')?.value, 10);

            if (!title) { window.showAlertModal('Nome do ritual é obrigatório.'); return; }
            if (!['morning', 'night'].includes(period)) { window.showAlertModal('Período inválido.'); return; }
            if (isNaN(xp)) xp = 10;
            if (isNaN(energyDelta)) energyDelta = 0;

            state.routineData.rituals.push({
                id: Date.now(),
                title,
                period,
                xp,
                energyDelta,
                active: true,
                createdAt: new Date().toISOString()
            });

            if (typeof window.checkGameTriggers === "function") window.checkGameTriggers();
            window.saveState();
            window.showToast('Ritual criado', 'Protocolo operacional adicionado.', 'clipboard-check', 'text-emerald-400');
        };

        window.completeRitual = function(ritualId) {
            const ritual = state.routineData.rituals.find(r => r.id === ritualId && r.active !== false);
            if (!ritual) { window.showAlertModal('Ritual não encontrado.'); return; }

            const todayKey = window.getLocalDateKey();
            const alreadyDone = state.routineData.logs.some(log => 
                log.ritualId === ritualId && window.getLocalDateKey(log.date || log.completedAt) === todayKey
            );

            if (alreadyDone) {
                window.showAlertModal('Este ritual já foi concluído hoje.');
                return;
            }

            const xpAwarded = Number.isFinite(Number(ritual.xp)) ? Number(ritual.xp) : 10;
            const energyDeltaApplied = Number.isFinite(Number(ritual.energyDelta)) ? Number(ritual.energyDelta) : 0;

            state.routineData.logs.push({
                id: Date.now(),
                ritualId,
                date: new Date().toISOString(),
                completedAt: new Date().toISOString(),
                xpAwarded,
                energyDeltaApplied
            });

            state.xp += xpAwarded;
            window.changeEnergy(energyDeltaApplied);
            window.checkLevelUp();
            if (typeof window.checkGameTriggers === "function") window.checkGameTriggers();
            window.saveState();
            window.showToast('Ritual concluído', `+${xpAwarded} XP. Consistência operacional registrada.`, 'check-circle', 'text-emerald-400');
        };

        window.deleteRitual = function(ritualId) {
            window.showConfirmModal('Deseja arquivar este ritual? O histórico será preservado.', () => {
                const ritual = state.routineData.rituals.find(r => r.id === ritualId);
                if (!ritual) { window.showAlertModal('Ritual não encontrado.'); return; }
                ritual.active = false;
                window.saveState();
                window.showToast('Ritual arquivado', 'Histórico preservado.', 'archive', 'text-slate-300');
            });
        };

        window.fillRitualSuggestion = function(title, period, xp, energyDelta) {
            const titleInput = document.getElementById('ritual-title');
            const periodInput = document.getElementById('ritual-period');
            const xpInput = document.getElementById('ritual-xp');
            const energyInput = document.getElementById('ritual-energy');

            if (titleInput) titleInput.value = title;
            if (periodInput) periodInput.value = period;
            if (xpInput) xpInput.value = xp;
            if (energyInput) energyInput.value = energyDelta;
        };

        window.isRitualCompletedToday = function(ritualId) {
            const todayKey = window.getLocalDateKey();
            return state.routineData.logs.some(log => 
                log.ritualId === ritualId && window.getLocalDateKey(log.date || log.completedAt) === todayKey
            );
        };

                ${rituals.length === 0 ? `<div class="mb-4 bg-slate-950 border border-slate-800 rounded-lg p-3 text-xs text-slate-500 italic">Nenhum ritual ativo. Crie um protocolo matinal ou noturno.</div>` : ''}

        let clockInterval;
        function startClock() {
            if(clockInterval) clearInterval(clockInterval);
            clockInterval = setInterval(() => {
                const el = document.getElementById('time-operational-widget');
                if(el) {
                    const now = new Date();
                    const time = now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
                    const date = now.toLocaleDateString('pt-BR', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'});
                    const hour = now.getHours();
                    let greeting = "Boa noite", contextMsg = "Feche ciclos e reduza carga.";
                    if(hour >= 0 && hour < 5) { greeting = "Boa madrugada"; contextMsg = "Modo vigília. Priorize descanso se possível."; }
                    else if(hour >= 5 && hour < 12) { greeting = "Bom dia"; contextMsg = "Inicie com uma missão essencial."; }
                    else if(hour >= 12 && hour < 18) { greeting = "Boa tarde"; contextMsg = "Mantenha cadência."; }
                    
                    el.innerHTML = `
                        <div class="flex items-center gap-3">
                            <i data-lucide="clock" class="w-8 h-8 text-indigo-500 opacity-80"></i>
                            <div>
                                <div class="text-2xl font-black text-white leading-none tabular-nums tracking-wider">${time}</div>
                                <div class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mt-1">${date}</div>
                            </div>
                        </div>
                        <div class="text-xs text-indigo-300 mt-3 border-t border-slate-800 pt-2 font-medium">
                            <strong class="text-white">${greeting}, Comandante.</strong> <span class="text-slate-500">${contextMsg}</span>
                        </div>
                    `;
                    // Refresh icon only if needed, but since it's static we can skip re-creating lucide inside setInterval usually.
                }
            }, 1000);
        }

        window.addSubject = function() {

            const trackId = document.getElementById('new-subject-track')?.value || '';
            const color = document.getElementById('new-subject-color')?.value || 'bg-cyan-500';
            if (!name) { window.showAlertModal('Digite o nome da disciplina.'); return; }
            if (!trackId) { window.showAlertModal('Escolha a trilha à qual esta disciplina pertence.'); return; }
            const duplicate = state.studyData.subjects.some(s => String(s.trackId) === String(trackId) && String(s.name || '').trim().toLowerCase() === name.toLowerCase());
            if (duplicate) { window.showAlertModal('Esta disciplina já existe dentro da trilha escolhida.'); return; }
            state.studyData.subjects.push({ id: Date.now(), name, trackId, color, createdAt: new Date().toISOString() });
            const track = window.getStudyTrack(trackId);
            window.showToast('Disciplina adicionada', `${name} entrou na trilha ${track.name}.`, 'book', track.color || 'text-cyan-400');
            window.saveState();
        };

        window.getStudySubjects = function(trackId = null) {
            const subjects = Array.isArray(state.studyData?.subjects) ? state.studyData.subjects : [];
            const filtered = trackId === null || trackId === undefined || trackId === ''
                ? subjects
                : subjects.filter(s => String(s.trackId || '') === String(trackId));
            return filtered.slice().sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'pt-BR'));
        };

        window.renderStudySubjectOptions = function({ trackId = null, selectedId = '', includeEmpty = true, emptyLabel = 'Sem disciplina vinculada' } = {}) {
            const tracks = window.getStudyTracks(true);
            const selected = String(selectedId || '');
            let html = includeEmpty ? `<option value="">${window.escapeHtml(emptyLabel)}</option>` : '';
            const appendOptions = (subjects, label = '') => {
                if (!subjects.length) return;
                if (label) html += `<optgroup label="${window.escapeHtml(label)}">`;
                html += subjects.map(s => `<option value="${s.id}" ${String(s.id) === selected ? 'selected' : ''}>${window.escapeHtml(s.name)}</option>`).join('');
                if (label) html += '</optgroup>';
            };
            if (trackId !== null && trackId !== undefined && trackId !== '') {
                const track = window.getStudyTrack(trackId);
                appendOptions(window.getStudySubjects(trackId), track.name);
                if (window.getStudySubjects(trackId).length === 0) html += '<option value="" disabled>Nenhuma disciplina cadastrada nesta trilha</option>';
                return html;
            }
            tracks.forEach(track => appendOptions(window.getStudySubjects(track.id), track.name));
            appendOptions(state.studyData.subjects.filter(s => !s.trackId), 'Sem trilha');
            return html;
        };

        window.updateSubjectTrack = function(subjectId, trackId) {
            const subject = state.studyData.subjects.find(s => String(s.id) === String(subjectId));
            const track = window.getStudyTracks(true).find(t => String(t.id) === String(trackId));
            if (!subject || !track) { window.showAlertModal('Disciplina ou trilha não encontrada.'); return; }
            subject.trackId = track.id;
            subject.updatedAt = new Date().toISOString();
            (state.studyData.studyPlan?.weeklyBlocks || []).forEach(block => {
                if (String(block.subjectId) === String(subject.id)) block.trackId = track.id;
            });
            window.saveState();
            window.showToast('Disciplina reorganizada', `${subject.name} agora pertence à trilha ${track.name}.`, 'route', track.color || 'text-cyan-400');

        window.logStudySession = function() {
            const subjectId = parseInt(document.getElementById('session-subject').value);
            const type = document.getElementById('session-type').value;
            const duration = parseInt(document.getElementById('session-duration').value);
            const qTotal = parseInt(document.getElementById('session-q-total').value) || 0;
            const qCorrect = parseInt(document.getElementById('session-q-correct').value) || 0;
            const topic = document.getElementById('session-topic').value.trim();
            const confBefore = parseInt(document.getElementById('session-conf-before').value);
            const confAfter = parseInt(document.getElementById('session-conf-after').value);
            const barriers = Array.from(document.querySelectorAll('input[name="session-barriers"]:checked')).map(cb => cb.value);

            if (!subjectId) { window.showAlertModal('Selecione uma disciplina.'); return; }
            if (qCorrect > qTotal) { window.showAlertModal('Acertos > Total.'); return; }

            const sessionId = Date.now();
            const typeData = SESSION_TYPES[type] || SESSION_TYPES['leitura'];
            const xpEarned = Math.round(((duration * 1.5) + (qCorrect * 3)) * typeData.mult);
            const energyDelta = -typeData.hp;

            let generatedReviewIds = [];

            // Adicionar repetição espaçada se for teoria ou leitura
            if (['teoria', 'leitura'].includes(type)) {
                [1, 7, 30].forEach(days => {
                    const reviewId = Date.now() + Math.random();
                    generatedReviewIds.push(reviewId);
                    const dueDate = new Date(); dueDate.setDate(dueDate.getDate() + days);
                    state.studyData.reviews.push({ 
                        id: reviewId, 
                        sourceSessionId: sessionId, 
                        subjectId: subjectId, 
                        topic: topic || 'Revisão Geral', 
                        dueDate: dueDate.toISOString(), 
                        intervalDays: days, 
                        status: 'pending',
                        phase: 'initial',
                        cycleStep: days,
                        xpAwarded: 0
                    });
                });
            }

            state.studyData.sessions.push({
                id: sessionId, subjectId, type, duration, qTotal, qCorrect, topic, 
                date: new Date().toISOString(), confBefore, confAfter, barriers,
                xpAwarded: xpEarned, energyDeltaApplied: energyDelta, generatedReviewIds: generatedReviewIds, createdAt: new Date().toISOString()
            });

            state.xp += xpEarned; window.changeEnergy(energyDelta);
            window.checkLevelUp();
            if (typeof window.checkGameTriggers === "function") window.checkGameTriggers();

            if (generatedReviewIds.length > 0) {
                window.showToast('Sessão Registrada!', `+${xpEarned} XP. Revisão programada.`, 'brain', 'text-fuchsia-400');
            } else {
                window.showToast('Sessão Registrada!', `+${xpEarned} XP consolidados.`, 'target', 'text-cyan-400');
            }

            if(state.energy < 20) {
                setTimeout(() => window.showAlertModal("Bateria Executiva Crítica (<20 HP). O sistema recomenda transição para atividades passivas ou encerramento."), 1000);
            }
            window.saveState();
        };

        window.recalculateLevelFromXp = function() {
            if (state.xp < 0) state.xp = 0;
            state.level = getCorrectLevel(state.xp);
        };

        window.deleteStudySession = function(sessionId) {
            const sessionIndex = state.studyData.sessions.findIndex(s => s.id === sessionId);
            if (sessionIndex === -1) {
                window.showAlertModal("Sessão não encontrada.");
                return;
            }
            const session = state.studyData.sessions[sessionIndex];

            window.showConfirmModal("Tem certeza que deseja excluir esta sessão? O XP, energia e revisões ligadas a ela serão recalculados.", () => {
                state.studyData.sessions.splice(sessionIndex, 1);

                let xpToDeduct = session.xpAwarded;
                if (typeof xpToDeduct === 'undefined') {
                    const typeData = SESSION_TYPES[session.type] || SESSION_TYPES['leitura'];
                    xpToDeduct = Math.round(((session.duration * 1.5) + (session.qCorrect * 3)) * typeData.mult);
                }
                state.xp -= xpToDeduct;

                let energyToRevert = session.energyDeltaApplied;
                if (typeof energyToRevert === 'undefined') {
                    const typeData = SESSION_TYPES[session.type] || SESSION_TYPES['leitura'];
                    energyToRevert = -typeData.hp; 
                }
                state.energy -= energyToRevert; 

                const reviewsToRemove = state.studyData.reviews.filter(r => 
                    r.sourceSessionId === sessionId || 
                    (session.generatedReviewIds && session.generatedReviewIds.includes(r.id))
                );
                
                reviewsToRemove.forEach(r => {
                    if (r.xpAwarded) {
                        state.xp -= r.xpAwarded;
                    }
                });

                state.studyData.reviews = state.studyData.reviews.filter(r => 
                    r.sourceSessionId !== sessionId && 
                    !(session.generatedReviewIds && session.generatedReviewIds.includes(r.id))
                );

                if (state.xp < 0) state.xp = 0;
                if (state.energy < 0) state.energy = 0;
                if (state.energy > 100) state.energy = 100;

                window.recalculateLevelFromXp();

                window.showToast("Sessão excluída", "XP, energia e revisões foram recalculados.", "trash-2", "text-red-400");
                window.saveState();
            });
        };

        window.showReviewPrompt = function(reviewId) { uiState.customPrompt = { show: true, type: 'reviewDifficulty', reviewId: reviewId }; render(); };
        window.closeCustomPrompt = function() { uiState.customPrompt = { show: false, type: '', reviewId: null }; render(); };
        
        window.processReviewDifficulty = function(diffStr) {
            const review = state.studyData.reviews.find(r => r.id === uiState.customPrompt.reviewId);
            if(review) {
                let xp = 0;
                if(diffStr === 'easy') { xp = 20; }
                else if(diffStr === 'medium') { xp = 35; }
                else if(diffStr === 'hard') { xp = 50; }
                else { xp = 60; }
                
                review.status = 'completed'; 
                review.completedAt = new Date().toISOString();
                review.xpAwarded = xp;
                review.difficultyOrigin = diffStr;
                
                state.xp += xp; window.checkLevelUp();
                
                const phase = review.phase || "initial";
                const step = review.cycleStep || review.intervalDays;
                
                let createNew = false;
                let nextDays = 0;
                let nextPhase = phase;
                let nextCycleStep = 0;

                if (phase === "initial") {
                    if (step === 1 || step === 7) {
                        createNew = false;
                    } else {
                        createNew = true;
                        if(diffStr === 'easy') { nextDays = 60; nextPhase = "maintenance"; nextCycleStep = 60; }
                        else if(diffStr === 'medium') { nextDays = 30; nextPhase = "initial"; nextCycleStep = 30; }
                        else if(diffStr === 'hard') { nextDays = 7; nextPhase = "initial"; nextCycleStep = 7; }
                        else { nextDays = 1; nextPhase = "initial"; nextCycleStep = 1; }
                    }
                } else if (phase === "maintenance") {
                    createNew = true;
                    if(diffStr === 'easy') { nextDays = 90; nextPhase = "maintenance"; nextCycleStep = 90; }
                    else if(diffStr === 'medium') { nextDays = 60; nextPhase = "maintenance"; nextCycleStep = 60; }
                    else if(diffStr === 'hard') { nextDays = 15; nextPhase = "maintenance"; nextCycleStep = 15; }
                    else { nextDays = 3; nextPhase = "maintenance"; nextCycleStep = 3; }
                }

                if (createNew) {
                    const newReviewId = Date.now() + Math.random();
                    review.nextReviewId = newReviewId;
                    
                    const dueDate = new Date(); dueDate.setDate(dueDate.getDate() + nextDays);
                    
                    const session = state.studyData.sessions.find(s => s.id === review.sourceSessionId);
                    if (session && session.generatedReviewIds) {
                        session.generatedReviewIds.push(newReviewId);
                    }

                    state.studyData.reviews.push({ 
                        id: newReviewId, 
                        sourceSessionId: review.sourceSessionId, 
                        subjectId: review.subjectId, 
                        topic: review.topic, 
                        dueDate: dueDate.toISOString(), 
                        intervalDays: nextDays, 
                        status: 'pending', 
                        difficultyOrigin: diffStr,
                        phase: nextPhase,
                        cycleStep: nextCycleStep,
                        xpAwarded: 0
                    });
                    
                    window.showToast('Revisão Calibrada', `+${xp} XP. Nova revisão em ${nextDays} dias.`, 'check-circle', 'text-emerald-400');
                } else {
                    window.showToast('Revisão Concluída', `+${xp} XP. Próxima etapa já estava programada.`, 'check-circle', 'text-emerald-400');
                }
                
                window.closeCustomPrompt(); if (typeof window.checkGameTriggers === "function") window.checkGameTriggers(); window.saveState();
            }
        };

        window.getSubjectStats = function(subjectId) {
            const sessions = state.studyData.sessions.filter(s => s.subjectId === subjectId);
            const totalTime = sessions.reduce((acc, s) => acc + s.duration, 0);
            const totalQ = sessions.reduce((acc, s) => acc + s.qTotal, 0);
            const correctQ = sessions.reduce((acc, s) => acc + s.qCorrect, 0);
            const retention = totalQ > 0 ? Math.round((correctQ / totalQ) * 100) : 0;
            const lastSession = sessions.length > 0 ? new Date(Math.max(...sessions.map(s => new Date(s.date)))) : null;
            return { totalTime, totalQ, correctQ, retention, lastSession };
        };

                let html = `

                    <div class="text-3xl font-black text-yellow-400 flex items-center gap-2"><i data-lucide="coins"></i> ${state.coins}</div>

                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 mt-6 flex items-center gap-2"><i data-lucide="star" class="w-4 h-4 text-yellow-500"></i> Oficiais</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">`;
                
                REWARDS_SHOP.forEach(r => {
                    const canAfford = state.coins >= r.cost;
                    html += `
                    <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl flex flex-col justify-between hover:border-slate-500 transition-colors">
                        <div>
                            <div class="flex justify-between items-start mb-2"><i data-lucide="${r.icon}" class="text-white w-6 h-6"></i><span class="bg-slate-950 text-yellow-400 text-xs font-bold px-2 py-1 rounded border border-yellow-900/50">${r.cost} MT</span></div>

                        <button onclick="window.buyReward('${r.id}')" class="mt-4 w-full py-2 rounded-lg text-xs font-bold transition-colors ${canAfford ? 'bg-emerald-600 hover:bg-emerald-500 text-white' : 'bg-slate-900 text-slate-500 cursor-not-allowed'}">${canAfford ? 'Resgatar' : 'Faltam Moedas'}</button>

                });
                html += `</div>`;

                html += `<h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-8 mb-3 flex items-center gap-2"><i data-lucide="package" class="w-4 h-4 text-indigo-400"></i> Personalizadas</h3>`;
                html += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">`;
                if (state.customRewards) {
                    state.customRewards.filter(r => r.active !== false).forEach(r => {
                        const canAfford = state.coins >= r.cost;
                        html += `
                        <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl flex flex-col justify-between hover:border-slate-500 transition-colors relative group">
                            <button onclick="window.deleteCustomReward(${r.id})" class="absolute top-2 right-2 text-slate-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="x" class="w-4 h-4"></i></button>
                            <div>
                                <div class="flex justify-between items-start mb-2"><i data-lucide="${r.icon}" class="text-white w-6 h-6"></i><span class="bg-slate-950 text-yellow-400 text-xs font-bold px-2 py-1 rounded border border-yellow-900/50">${r.cost} MT</span></div>
                                <h4 class="font-bold text-white text-sm">${r.title}</h4><p class="text-xs text-slate-400 mt-1 leading-tight">${r.desc}</p>

                            <button onclick="window.buyCustomReward(${r.id})" class="mt-4 w-full py-2 rounded-lg text-xs font-bold transition-colors ${canAfford ? 'bg-indigo-600 hover:bg-indigo-500 text-white' : 'bg-slate-900 text-slate-500 cursor-not-allowed'}">${canAfford ? 'Resgatar' : 'Faltam Moedas'}</button>

                html += `</div>`;

                html += `
                <div class="bg-slate-950 border border-slate-800 rounded-xl p-5 mb-8">

                </div>`;

                html += `<h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2"><i data-lucide="history" class="w-4 h-4 text-emerald-500"></i> Histórico de Resgates</h3>`;
                html += `<div class="space-y-2">`;
                if (!state.rewardPurchases || state.rewardPurchases.length === 0) {
                    html += `<p class="text-xs text-slate-500 italic">Nenhum resgate registrado ainda.</p>`;
                } else {
                    state.rewardPurchases.slice().sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 10).forEach(rp => {

                                <span class="text-sm font-bold text-white">${rp.title}</span>
                            </div>
                            <span class="text-xs text-yellow-400 font-bold bg-yellow-950/30 px-2 py-1 rounded border border-yellow-900/50">${rp.cost} MT</span>

        // --- ESTUDOS ---
        function renderStudyContent() {
            if (uiState.studyTab === 'plano') {
                const selectedDayId = state.activeTab || daysOfWeek[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1]?.id || 'monday';
                const selectedDay = daysOfWeek.find(d => d.id === selectedDayId) || { label: 'Hoje' };
                const dayBlocks = window.getStudyBlocksForDay(selectedDayId).filter(b => b.status !== 'cancelled');
                const completedBlocks = dayBlocks.filter(b => b.status === 'completed').length;
                const plannedMinutes = dayBlocks.reduce((acc, b) => acc + (parseInt(b.plannedMinutes, 10) || 0), 0);
                const completedMinutes = dayBlocks.filter(b => b.status === 'completed').reduce((acc, b) => acc + (parseInt(b.plannedMinutes, 10) || 0), 0);
                const progressPct = dayBlocks.length ? Math.round((completedBlocks / dayBlocks.length) * 100) : 0;

                const plannedSubjectIds = new Set(dayBlocks.filter(b => b.subjectId !== null && b.subjectId !== undefined && b.subjectId !== '').map(b => String(b.subjectId)));
                const now = new Date();
                const dueReviews = state.studyData.reviews.filter(r => r.status === 'pending' && new Date(r.dueDate) <= now && plannedSubjectIds.has(String(r.subjectId)));
                const openErrors = state.studyData.errorLog.filter(e => e.status === 'open' && plannedSubjectIds.has(String(e.subjectId)));
                let recs = [];

                if (dueReviews.length > 0) recs.push({ title: 'Revisões ligadas ao plano', desc: `Há ${dueReviews.length} revisão${dueReviews.length !== 1 ? 'ões' : ''} pendente${dueReviews.length !== 1 ? 's' : ''} das disciplinas previstas para este dia.`, color: 'text-red-400', border: 'border-red-900/50', icon: 'rotate-cw' });
                if (openErrors.length > 0) recs.push({ title: 'Erros ligados ao plano', desc: `Há ${openErrors.length} item${openErrors.length !== 1 ? 's' : ''} aberto${openErrors.length !== 1 ? 's' : ''} no Caderno de Erros das disciplinas previstas para este dia.`, color: 'text-orange-400', border: 'border-orange-900/50', icon: 'microscope' });

                plannedSubjectIds.forEach(subjectId => {
                    const sub = state.studyData.subjects.find(s => String(s.id) === String(subjectId));
                    if (!sub) return;
                    const stats = window.getSubjectStats(sub.id);
                    if (stats.retention > 0 && stats.retention < 70) {
                        recs.push({ title: `Reforço sugerido: ${sub.name}`, desc: `Retenção atual de ${stats.retention}%. Considere questões curtas ou recuperação ativa durante o bloco planejado.`, color: 'text-yellow-400', border: 'border-yellow-900/50', icon: 'brain' });
                    }
                    if (!stats.lastSession || (now - stats.lastSession) / (1000 * 60 * 60 * 24) > 7) {
                        recs.push({ title: `Retomada sugerida: ${sub.name}`, desc: 'Esta disciplina está no plano de hoje e não possui sessão recente registrada. Comece com um bloco pequeno para reduzir a resistência inicial.', color: 'text-slate-300', border: 'border-slate-700', icon: 'history' });
                    }
                });

                if (dayBlocks.length > 0 && state.energy < 30) {
                    recs.unshift({ title: 'Bateria executiva baixa', desc: 'Mantenha o planejamento, mas reduza a exigência: leitura leve, flashcards ou um bloco menor.', color: 'text-blue-400', border: 'border-blue-900/50', icon: 'battery-low' });
                }

                let html = `
                    <div class="bg-cyan-950/10 border border-cyan-900/30 p-5 rounded-xl mb-6">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
                            <div>
                                <h3 class="text-cyan-400 font-black uppercase tracking-widest text-sm flex items-center gap-2"><i data-lucide="calendar-check" class="w-4 h-4"></i> Plano de ${selectedDay.label}</h3>
                                <p class="text-[11px] text-slate-500 mt-1">Aqui aparecem somente os blocos criados em Planejamento. Cadastrar uma disciplina no Arsenal não a coloca automaticamente no dia.</p>
                            </div>
                            <div class="flex flex-wrap items-center gap-2 text-[10px] font-bold uppercase tracking-widest">
                                <span class="bg-slate-950 border border-slate-800 text-slate-400 px-2 py-1 rounded-lg">${completedBlocks}/${dayBlocks.length} blocos</span>
                                <span class="bg-cyan-950/40 border border-cyan-900/50 text-cyan-300 px-2 py-1 rounded-lg">${completedMinutes}/${plannedMinutes} min</span>
                                <button onclick="window.setStudyTab('planning')" class="bg-cyan-700 hover:bg-cyan-600 text-white px-3 py-1.5 rounded-lg flex items-center gap-1"><i data-lucide="plus" class="w-3 h-3"></i> Planejar</button>
                            </div>
                        </div>
                        ${dayBlocks.length ? `<div class="w-full bg-slate-800 rounded-full h-2 mb-4"><div class="bg-cyan-500 h-2 rounded-full transition-all" style="width:${progressPct}%"></div></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-3">${dayBlocks.map(b => renderStudyPlanBlockCard(b, true)).join('')}</div>` : `<div class="border border-dashed border-slate-800 rounded-xl p-6 text-center"><i data-lucide="calendar-plus" class="w-9 h-9 text-slate-600 mx-auto mb-2"></i><p class="text-sm text-slate-500 italic mb-1">Nenhum estudo foi planejado para ${selectedDay.label}.</p><p class="text-[11px] text-slate-600 mb-3">As disciplinas do Arsenal continuam cadastradas, mas só aparecem aqui quando você cria um bloco para este dia.</p><button onclick="window.setStudyTab('planning')" class="bg-cyan-800 hover:bg-cyan-700 text-white px-4 py-2 rounded-lg text-xs font-black uppercase tracking-widest">Criar planejamento</button></div>`}
                    </div>`;

                if (dayBlocks.length > 0) {
                    html += `<div class="bg-slate-950 border border-slate-800 p-5 rounded-xl"><h3 class="text-slate-300 font-black uppercase tracking-widest text-xs mb-1 flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4 text-cyan-400"></i>Apoios para executar o plano</h3><p class="text-[10px] text-slate-600 mb-4">Estes avisos consideram apenas as disciplinas vinculadas aos blocos de ${selectedDay.label}; não são novos estudos adicionados automaticamente.</p><div class="space-y-3">`;
                    if (recs.length === 0) html += `<div class="text-slate-500 italic text-sm border border-dashed border-slate-800 rounded-lg p-4">Nenhum alerta específico para os blocos planejados. Execute a agenda normalmente.</div>`;
                    recs.slice(0, 5).forEach(r => {
                        html += `<div class="bg-slate-900 border ${r.border} p-4 rounded-lg flex items-start gap-3"><i data-lucide="${r.icon || 'info'}" class="${r.color} w-5 h-5 mt-0.5"></i><div><h4 class="font-bold text-white text-sm">${r.title}</h4><p class="text-xs text-slate-400 mt-1">${r.desc}</p></div></div>`;
                    });
                    html += `</div></div>`;
                }

                return html;
            }
            else if (uiState.studyTab === 'planning') {
                return renderStudyPlanningContent();
            }
            else if (uiState.studyTab === 'dashboard') {
                const totalSessions = state.studyData.sessions.length;
                const totalMinutes = state.studyData.sessions.reduce((acc, s) => acc + s.duration, 0);
                const totalQ = state.studyData.sessions.reduce((acc, s) => acc + s.qTotal, 0);
                const correctQ = state.studyData.sessions.reduce((acc, s) => acc + s.qCorrect, 0);
                const globalRetention = totalQ > 0 ? Math.round((correctQ / totalQ) * 100) : 0;
                
                let confBeforeAvg = 0, confAfterAvg = 0;
                const sessionsWithConf = state.studyData.sessions.filter(s => s.confBefore && s.confAfter);
                if(sessionsWithConf.length > 0) {
                    confBeforeAvg = (sessionsWithConf.reduce((acc, s) => acc + s.confBefore, 0) / sessionsWithConf.length).toFixed(1);
                    confAfterAvg = (sessionsWithConf.reduce((acc, s) => acc + s.confAfter, 0) / sessionsWithConf.length).toFixed(1);
                }

                let html = `
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl flex flex-col items-center justify-center text-center"><i data-lucide="clock" class="text-indigo-400 mb-2 w-6 h-6"></i><span class="text-2xl font-black text-white">${(totalMinutes / 60).toFixed(1)}h</span><span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1">Tempo Total</span></div>
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl flex flex-col items-center justify-center text-center"><i data-lucide="target" class="text-cyan-400 mb-2 w-6 h-6"></i><span class="text-2xl font-black text-white">${totalQ}</span><span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1">Questões</span></div>
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl flex flex-col items-center justify-center text-center relative overflow-hidden"><i data-lucide="percent" class="text-emerald-400 mb-2 w-6 h-6"></i><span class="text-2xl font-black text-white">${globalRetention}%</span><span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1">Retenção</span></div>
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl flex flex-col items-center justify-center text-center"><i data-lucide="brain" class="text-fuchsia-400 mb-2 w-6 h-6"></i><span class="text-2xl font-black text-white">${confBeforeAvg} > ${confAfterAvg}</span><span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1">Confiança Média</span></div>
                </div>

                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-8 mb-3 flex items-center gap-2"><i data-lucide="bar-chart" class="w-4 h-4 text-indigo-400"></i> Painel de Desempenho</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                `;

                // --- Gráfico 1: Estudos - Últimos 7 dias ---
                const todayForChart = new Date();
                todayForChart.setHours(0,0,0,0);
                const last7Days = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(todayForChart);
                    d.setDate(d.getDate() - i);
                    last7Days.push(d);
                }
                const dayNames = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
                let maxMins = 0;
                const studyChartData = last7Days.map(dateObj => {
                    let totalMins = 0;
                    const sessions = state.studyData?.sessions || [];
                    sessions.forEach(s => {
                        if (s.date) {
                            const sd = new Date(s.date);
                            if (sd.getFullYear() === dateObj.getFullYear() && sd.getMonth() === dateObj.getMonth() && sd.getDate() === dateObj.getDate()) {
                                totalMins += (s.duration || 0);
                            }
                        }
                    });
                    if (totalMins > maxMins) maxMins = totalMins;
                    return { label: dayNames[dateObj.getDay()], mins: totalMins };
                });

                html += `<div class="bg-slate-950 border border-slate-800 p-4 rounded-xl flex flex-col">
                            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Estudos — Últimos 7 dias</h4>`;
                
                if (maxMins === 0) {
                    html += `<div class="flex-1 flex items-center justify-center text-xs text-slate-600 italic">Nenhuma sessão registrada nos últimos 7 dias.</div>`;
                } else {
                    html += `<div class="flex items-end justify-between h-32 mt-auto px-1 sm:px-2 gap-1 sm:gap-2">`;
                    studyChartData.forEach(c => {
                        const heightPercent = maxMins > 0 ? (c.mins / maxMins) * 100 : 0;
                        html += `
                        <div class="flex flex-col items-center gap-1.5 w-full">
                            <span class="text-[9px] font-bold text-cyan-400">${c.mins > 0 ? c.mins + 'm' : ''}</span>
                            <div class="w-full max-w-[20px] bg-cyan-600 rounded-t-sm transition-all relative group" style="height: ${Math.max(heightPercent, 2)}%;">
                                ${c.mins > 0 ? `<div class="absolute -top-6 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white text-[9px] px-1.5 py-0.5 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap pointer-events-none transition-opacity">${c.mins} min</div>` : ''}
                            </div>
                            <span class="text-[9px] text-slate-500 uppercase font-bold">${c.label}</span>
                        </div>`;
                    });
                    html += `</div>`;
                }
                html += `</div>`;

                // --- Gráfico 2: Eficiência da Semana ---
                const efficiencyChartData = daysOfWeek.map(day => {
                    const dayTasks = (state.tasks || []).filter(t => t.day === day.id);
                    const total = dayTasks.length;
                    const completed = dayTasks.filter(t => t.completed).length;
                    const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
                    return { label: day.label.substring(0,3), total, completed, percent };
                });

                html += `<div class="bg-slate-950 border border-slate-800 p-4 rounded-xl flex flex-col">
                            <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Eficiência da Semana</h4>
                            <div class="space-y-2.5 overflow-y-auto pr-1">`;
                
                efficiencyChartData.forEach(c => {
                    const barColor = c.percent === 100 ? 'bg-emerald-500' : (c.percent > 0 ? 'bg-indigo-500' : 'bg-slate-700');
                    const textColor = c.percent === 100 ? 'text-emerald-400' : (c.percent > 0 ? 'text-indigo-400' : 'text-slate-600');
                    html += `
                    <div>
                        <div class="flex justify-between text-[9px] font-bold mb-1 uppercase tracking-wider">
                            <span class="text-slate-400">${c.label} <span class="text-slate-600 ml-1">(${c.completed}/${c.total})</span></span>
                            <span class="${textColor}">${c.percent}%</span>
                        </div>
                        <div class="w-full bg-slate-900 rounded-full h-1.5">
                            <div class="${barColor} h-1.5 rounded-full transition-all" style="width: ${c.percent}%"></div>
                        </div>
                    </div>`;
                });
                html += `</div></div></div>`;

                html += `<h3 class="text-sm font-bold text-slate-300 mb-4 flex items-center gap-2 uppercase tracking-widest"><i data-lucide="bar-chart-2" class="text-cyan-500 w-4 h-4"></i> Radar de Retenção</h3>
                <div class="space-y-4">`;

                if (state.studyData.subjects.length === 0) html += `<p class="text-slate-500 text-sm italic text-center p-8 bg-slate-950 rounded-xl border border-slate-800">Arsenal vazio.</p>`;
                state.studyData.subjects.forEach(sub => {
                    const stats = window.getSubjectStats(sub.id);
                    let radarStatus = "Esquecida", color = "bg-slate-600";
                    if(stats.lastSession && (now - stats.lastSession) / (1000*60*60*24) <= 10) {
                        if(stats.retention >= 80) { radarStatus = "Forte"; color = "bg-emerald-500"; }
                        else if(stats.retention >= 60) { radarStatus = "Atenção"; color = "bg-yellow-500"; }
                        else { radarStatus = "Crítica"; color = "bg-red-500"; }
                    }
                    
                    html += `
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl">
                        <div class="flex justify-between items-end mb-2">
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full ${sub.color}"></div><span class="font-bold text-white text-sm">${sub.name}</span></div>
                            <span class="text-[10px] uppercase font-bold tracking-widest px-2 py-0.5 rounded text-white ${color}">${radarStatus}</span>
                        </div>
                        <div class="flex-1 mt-3">
                            <div class="flex justify-between text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wider"><span>Retenção (${stats.correctQ}/${stats.totalQ})</span><span class="${color.replace('bg-','text-')}">${stats.retention}%</span></div>
                            <div class="w-full bg-slate-900 rounded-full h-2 border border-slate-800"><div class="${color} h-2 rounded-full transition-all" style="width: ${stats.retention}%"></div></div>
                        </div>
                    </div>`;
                });
                html += `</div>`;
