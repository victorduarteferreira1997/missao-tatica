<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Tática da Semana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .timer-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
        
        .modal-enter { animation: modalFadeIn 0.25s ease-out forwards; }
        @keyframes modalFadeIn { 
            from { opacity: 0; transform: scale(0.95) translateY(10px); } 
            to { opacity: 1; transform: scale(1) translateY(0); } 
        }
        
        .float-text {
            position: fixed; pointer-events: none; animation: floatUp 1.2s cubic-bezier(0.2, 1, 0.3, 1) forwards;
            font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.5); z-index: 100;
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-60px) scale(1); }
        }

        .toast-enter { animation: slideInRight 0.4s cubic-bezier(0.2, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { 
            from { transform: translateX(100%); opacity: 0; } 
            to { transform: translateX(0); opacity: 1; } 
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen p-2 sm:p-6 pb-24 overflow-x-hidden">
    
    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-20 right-4 z-[110] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Tela de Login (Overlay) -->
    <div id="auth-overlay" class="fixed inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-slate-900 border border-slate-700 rounded-2xl p-8 max-w-md w-full text-center shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            <div class="flex justify-center mb-6">
                <div class="bg-indigo-600/20 p-4 rounded-full border border-indigo-500/30">
                    <i data-lucide="shield" class="w-12 h-12 text-indigo-400"></i>
                </div>
            </div>
            <h1 class="text-3xl font-black text-white mb-2 tracking-widest font-mono">MISSÃO TÁTICA</h1>
            <p class="text-slate-400 mb-8 text-sm leading-relaxed">Autentique-se para acessar o seu Quartel General e sincronizar a sua Bateria Executiva na nuvem Firebase.</p>
            <button onclick="window.login()" class="w-full bg-white hover:bg-slate-200 text-slate-900 font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-3 transition-colors shadow-lg">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Entrar com Google
            </button>
        </div>
    </div>

    <!-- Aplicação Principal (Oculta até o login) -->
    <div id="app-wrapper" class="hidden max-w-4xl mx-auto space-y-4 sm:space-y-6">
        <div id="app"></div>
    </div>

    <!-- Input Oculto para Importação de Backup -->
    <input type="file" id="import-file" accept=".json" class="hidden" onchange="window.importData(event)">

    <!-- Script Principal com Firebase em Módulo -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // CONFIGURAÇÕES FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDaenZA-iq-VpN_02N3Cw4-tqlQQVOBWWQ",
            authDomain: "missao-tatica.firebaseapp.com",
            projectId: "missao-tatica",
            storageBucket: "missao-tatica.firebasestorage.app",
            messagingSenderId: "651538676501",
            appId: "1:651538676501:web:ca3dc3356a1b1769f9471c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==========================================
        // DADOS E CONSTANTES GERAIS
        // ==========================================
        const ICONS = { work: 'briefcase', law: 'scale', home: 'home', life: 'heart', health: 'pill', finance: 'dollar-sign', leisure: 'gamepad-2', study: 'book-open', default: 'target' };

        const daysOfWeek = [
            { id: 'monday', label: 'Segunda' }, { id: 'tuesday', label: 'Terça' }, { id: 'wednesday', label: 'Quarta' },
            { id: 'thursday', label: 'Quinta' }, { id: 'friday', label: 'Sexta' }, { id: 'saturday', label: 'Sábado' }, { id: 'sunday', label: 'Domingo' }
        ];

        const RANKS = [
            { level: 1, name: 'Recruta', max: 600 }, { level: 2, name: 'Soldado', max: 1500 }, { level: 3, name: 'Cabo', max: 2800 },
            { level: 4, name: 'Sargento', max: 4500 }, { level: 5, name: 'Tenente', max: 6800 }, { level: 6, name: 'Capitão', max: 10000 },
            { level: 7, name: 'Major', max: 14000 }, { level: 8, name: 'Coronel', max: 19000 }, { level: 9, name: 'General', max: 25000 },
            { level: 10, name: 'Comandante Supremo', max: 33000 }, { level: 11, name: 'Estrategista Mestre', max: 43000 }, { level: 12, name: 'Lenda Tática', max: 55000 },
            { level: 13, name: 'Mito da Produtividade', max: 70000 }, { level: 14, name: 'Titã Executivo', max: 90000 }, { level: 15, name: 'Deus do Foco', max: 999999 }
        ];

        const BADGES_DB = [
            { id: 'primeiro_sangue', icon: 'swords', color: 'text-red-400', title: 'Primeiro Sangue', desc: 'Completou a sua primeira missão.' },
            { id: 'oasis', icon: 'droplets', color: 'text-blue-400', title: 'Oásis Tático', desc: 'Bebeu água 5 vezes. Hidratação blindada.' },
            { id: 'estrategista', icon: 'git-merge', color: 'text-purple-400', title: 'Mente Flexível', desc: 'Moveu uma missão de dia. Agência total.' },
            { id: 'frenesi', icon: 'zap', color: 'text-yellow-400', title: 'Frenesi Implacável', desc: 'Atingiu um Combo x3 de execução contínua.' },
            { id: 'pomo_master', icon: 'clock', color: 'text-emerald-400', title: 'Senhor do Tempo', desc: 'Finalizou o primeiro ciclo completo do Pomodoro.' },
            { id: 'shopaholic', icon: 'shopping-cart', color: 'text-orange-400', title: 'Investidor de Vida', desc: 'Comprou o seu primeiro resgate no Mercado Negro.' },
            { id: 'work_demon', icon: 'briefcase', color: 'text-blue-500', title: 'Demônio do Roadmap', desc: 'Concluiu 5 tarefas de Trabalho com maestria.' },
            { id: 'legal_eagle', icon: 'scale', color: 'text-indigo-500', title: 'Águia da Lei', desc: 'Concluiu 3 tarefas importantes de Advocacia.' },
            { id: 'home_architect', icon: 'home', color: 'text-emerald-500', title: 'Arquiteto do Lar', desc: 'Concluiu 3 tarefas de Casa/Limpeza.' },
            { id: 'hydro_god', icon: 'glass-water', color: 'text-sky-400', title: 'Divindade Líquida', desc: 'Bebeu água 10 vezes. HP sob controle absoluto.' },
            { id: 'deep_focus', icon: 'brain', color: 'text-violet-400', title: 'Foco Absoluto', desc: 'Completou 4 ciclos Pomodoro de trabalho.' },
            { id: 'perfect_day', icon: 'check-check', color: 'text-teal-400', title: 'Dia Impecável', desc: 'Concluiu 100% de todas as tarefas de um único dia.' }
        ];

        const REWARDS_SHOP = [
            { id: 'r1', icon: 'tv', title: '1 Episódio de Série', cost: 150, desc: 'Assista sem culpa nenhuma.' },
            { id: 'r2', icon: 'gamepad-2', title: '30 min de Videogame', cost: 200, desc: 'Mergulho em dopamina virtual.' },
            { id: 'r3', icon: 'coffee', title: 'Pausa Total (30 min)', cost: 100, desc: 'Fazer absolutamente nada no sofá.' },
            { id: 'r4', icon: 'cookie', title: 'Comer um Doce/Junk Food', cost: 80, desc: 'Recompensa de glicose tática.' }
        ];

        // ==========================================
        // GESTÃO DE ESTADO & CLOUD SYNC
        // ==========================================
        let currentUser = null;
        let saveTimeout;
        let currentSyncStatus = 'Desconectado';

        // Carrega estado local inicial
        let state = JSON.parse(localStorage.getItem('planeamento_semanal_v11'));
        
        let uiState = {
            showPanic: false, breathingStep: 0, breathingInterval: null,
            showLevelUp: false, showStatsModal: false, statsTab: 'roadmap',
            showCreateTaskModal: false,
            showStudyModal: false, studyTab: 'dashboard',
            confirm: { show: false, message: '', onConfirm: null },
            alert: { show: false, message: '' }
        };

        let pomodoro = { isRunning: false, timeLeft: 25 * 60, mode: 'focus', cycle: 1, intervalId: null };

        function getCorrectLevel(currentXp) {
            let correctLevel = 1;
            for (let i = 0; i < RANKS.length; i++) {
                if (currentXp >= RANKS[i].max) correctLevel = RANKS[i].level + 1;
                else break;
            }
            return Math.min(correctLevel, RANKS.length);
        }

        window.validateState = function() {
            // ESTADO INICIAL ZERADO SE NÃO HOUVER DADOS
            if (!state) {
                state = {
                    activeTab: 'monday', focusMode: false, focusedTaskId: null,
                    xp: 0, level: 1, energy: 100, waterCount: 0, coins: 0, combo: 0,
                    unlockedBadges: [], tasks: [], quickTasks: [], currentFilter: 'all',
                    pomodoroSettings: { focus: 25, shortBreak: 5, longBreak: 15, cycles: 4 },
                    stats: { pomodorosCompleted: 0, tasksMoved: 0, maxComboReached: 0, rewardsBought: 0 },
                    studyData: { subjects: [], sessions: [], reviews: [] }
                };
            }
            if (!state.stats) state.stats = { pomodorosCompleted: 0, tasksMoved: 0, maxComboReached: 0, rewardsBought: 0 };
            if (typeof state.stats.tasksMoved === 'undefined') state.stats.tasksMoved = 0;
            if (typeof state.stats.pomodorosCompleted === 'undefined') state.stats.pomodorosCompleted = 0;
            if (typeof state.stats.maxComboReached === 'undefined') state.stats.maxComboReached = state.combo || 0;
            if (typeof state.stats.rewardsBought === 'undefined') state.stats.rewardsBought = 0;
            if (!state.quickTasks) state.quickTasks = [];
            if (!state.unlockedBadges) state.unlockedBadges = [];
            if (!state.tasks) state.tasks = []; 
            if (!state.currentFilter) state.currentFilter = 'all';
            
            // Validação do novo módulo de estudos
            if (!state.studyData) state.studyData = { subjects: [], sessions: [], reviews: [] };
            if (!state.studyData.subjects) state.studyData.subjects = [];
            if (!state.studyData.sessions) state.studyData.sessions = [];
            if (!state.studyData.reviews) state.studyData.reviews = [];
            
            // Garantir que pomodoro herda tempo se recém carregado
            if(!pomodoro.isRunning) pomodoro.timeLeft = state.pomodoroSettings.focus * 60;
        };

        window.validateState();

        // ------------------------------------------
        // LÓGICA DE FIREBASE / LOGIN
        // ------------------------------------------
        window.updateSyncStatus = function(status) {
            currentSyncStatus = status;
            const syncText = document.getElementById('sync-text');
            const syncIndicator = document.getElementById('sync-indicator');
            if(syncText && syncIndicator) {
                syncText.innerText = status;
                syncIndicator.className = 'w-2 h-2 rounded-full shrink-0 ';
                if(status === 'Desconectado') syncIndicator.className += 'bg-slate-500';
                else if(status === 'Conectado') syncIndicator.className += 'bg-blue-400';
                else if(status === 'Salvando...' || status === 'Carregando...') syncIndicator.className += 'bg-yellow-400 animate-pulse';
                else if(status === 'Salvo na nuvem') syncIndicator.className += 'bg-emerald-400';
                else if(status === 'Erro ao salvar' || status === 'Erro de conexão') syncIndicator.className += 'bg-red-500';
            }
        };

        window.login = async function() {
            try {
                const provider = new GoogleAuthProvider();
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Erro no login", error);
                if (error.code === 'auth/unauthorized-domain') {
                    window.showAlertModal("⚠️ Domínio bloqueado pelo Firebase.<br><br>Para testar o login com Google neste ambiente de visualização, acesse o <b>Firebase Console > Authentication > Settings > Authorized domains</b> e adicione o domínio <b>googleusercontent.com</b>.<br><br>O login continuará funcionando normalmente no seu localhost.");
                } else {
                    window.showAlertModal("Falha ao entrar com Google: " + error.message);
                }
            }
        };

        window.logout = async function() {
            try {
                await signOut(auth);
            } catch (error) {
                console.error("Erro no logout", error);
            }
        };

        async function loadFromFirestore(uid) {
            window.updateSyncStatus('Carregando...');
            try {
                const docRef = doc(db, 'users', uid, 'state', 'main');
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    const cloudState = JSON.parse(docSnap.data().data);
                    state = { ...state, ...cloudState }; // Merge base config com cloud config
                    window.validateState();
                    localStorage.setItem('planeamento_semanal_v11', JSON.stringify(state));
                    window.updateSyncStatus('Conectado');
                } else {
                    // Primeira vez, salva o local na nuvem
                    window.validateState();
                    window.saveToFirestore();
                }
            } catch(e) {
                console.error("Erro ao carregar do Firestore", e);
                window.updateSyncStatus('Erro de conexão');
            }
            render();
        }

        window.saveToFirestore = function() {
            if (!currentUser) return;
            window.updateSyncStatus('Salvando...');
            clearTimeout(saveTimeout);
            
            // Usando debounce para não estourar a cota do Firebase
            saveTimeout = setTimeout(async () => {
                try {
                    // 1. Criar/atualizar o documento pai do usuário para visibilidade no console
                    const userRef = doc(db, 'users', currentUser.uid);
                    await setDoc(userRef, {
                        email: currentUser.email,
                        displayName: currentUser.displayName || '',
                        updatedAt: new Date().toISOString(),
                        app: 'missao-tatica'
                    }, { merge: true });

                    // 2. Salvar o estado na subcoleção state/main
                    const stateRef = doc(db, 'users', currentUser.uid, 'state', 'main');
                    await setDoc(stateRef, { 
                        data: JSON.stringify(state),
                        updatedAt: new Date().toISOString()
                    }, { merge: true });

                    window.updateSyncStatus('Salvo na nuvem');
                } catch (e) {
                    console.error("Erro no save do Firestore:", e);
                    window.updateSyncStatus('Erro ao salvar');
                }
            }, 1000);
        };

        window.saveState = function(skipRender = false) {
            localStorage.setItem('planeamento_semanal_v11', JSON.stringify(state));
            window.saveToFirestore();
            if(!skipRender) render();
        };

        // Observador Global de Auth
        onAuthStateChanged(auth, async (user) => {
            const overlay = document.getElementById('auth-overlay');
            const wrapper = document.getElementById('app-wrapper');
            if (user) {
                currentUser = user;
                window.updateSyncStatus('Conectado');
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 300);
                wrapper.style.display = 'block';
                await loadFromFirestore(user.uid);
            } else {
                currentUser = null;
                window.updateSyncStatus('Desconectado');
                overlay.style.display = 'flex';
                overlay.style.opacity = '1';
                wrapper.style.display = 'none';
            }
        });

        // ------------------------------------------
        // EXPORT & IMPORT DE JSON
        // ------------------------------------------
        window.exportData = function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `missao_tatica_backup_${new Date().toISOString().slice(0,10)}.json`);
            dlAnchorElem.click();
        };

        window.triggerImport = function() {
            document.getElementById('import-file').click();
        };

        window.importData = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedState = JSON.parse(e.target.result);
                    if (importedState && importedState.tasks) {
                        state = importedState;
                        window.validateState();
                        window.saveState();
                        window.showToast("Importação Concluída", "Os seus dados foram recuperados com sucesso.", "upload-cloud", "text-emerald-400");
                    } else {
                        window.showAlertModal("Arquivo JSON inválido para esta aplicação.");
                    }
                } catch(err) {
                    window.showAlertModal("Erro ao processar o arquivo.");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset do input
        };

        // ==========================================
        // LÓGICA DE NEGÓCIO E JOGO (GLOBALIZADAS)
        // ==========================================
        window.formatTime = function(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };

        window.spawnFloatingText = function(e, text, colorClass = 'text-indigo-400') {
            if(!e || !e.clientX) return; 
            const el = document.createElement('div');
            el.className = `float-text text-xl ${colorClass}`;
            el.innerText = text;
            const offsetX = (Math.random() - 0.5) * 40;
            el.style.left = `${e.clientX + offsetX}px`;
            el.style.top = `${e.clientY - 20}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        };

        window.showConfirmModal = function(message, onConfirmCallback) {
            uiState.confirm.show = true;
            uiState.confirm.message = message;
            uiState.confirm.onConfirm = onConfirmCallback;
            render();
        };

        window.handleConfirmResult = function(accepted) {
            uiState.confirm.show = false;
            if (accepted && uiState.confirm.onConfirm) uiState.confirm.onConfirm();
            uiState.confirm.onConfirm = null;
            render();
        };

        window.showAlertModal = function(message) {
            uiState.alert.show = true;
            uiState.alert.message = message;
            render();
        };

        window.closeAlertModal = function() {
            uiState.alert.show = false;
            render();
        };

        window.togglePanicModal = function(show) {
            uiState.showPanic = show;
            if (show) {
                uiState.breathingStep = 0;
                uiState.breathingInterval = setInterval(() => {
                    uiState.breathingStep = (uiState.breathingStep + 1) % 4;
                    render();
                }, 4000);
            } else {
                clearInterval(uiState.breathingInterval);
            }
            render();
        };

        window.unlockBadge = function(badgeId) {
            if (!state.unlockedBadges.includes(badgeId)) {
                state.unlockedBadges.push(badgeId);
                const b = BADGES_DB.find(x => x.id === badgeId);
                if (b) {
                    window.showToast(`Conquista Desbloqueada!`, b.title, b.icon, b.color);
                    state.xp += 100;
                    state.coins += 50;
                }
            }
        };

        window.checkGameTriggers = function() {
            const activeBadges = [];
            if (state.tasks.length > 0 && state.tasks.some(t => t.completed)) activeBadges.push('primeiro_sangue');
            if (state.waterCount >= 5) activeBadges.push('oasis');
            if (state.stats.tasksMoved >= 1) activeBadges.push('estrategista');
            if (state.combo >= 3 || state.stats.maxComboReached >= 3) activeBadges.push('frenesi');
            if (state.stats.pomodorosCompleted >= 1) activeBadges.push('pomo_master');
            if (state.stats.rewardsBought >= 1) activeBadges.push('shopaholic');
            if (state.tasks.filter(t => t.completed && t.category === 'work').length >= 5) activeBadges.push('work_demon');
            if (state.tasks.filter(t => t.completed && t.category === 'law').length >= 3) activeBadges.push('legal_eagle');
            if (state.tasks.filter(t => t.completed && t.category === 'home').length >= 3) activeBadges.push('home_architect');
            if (state.waterCount >= 10) activeBadges.push('hydro_god');
            if (state.stats.pomodorosCompleted >= 4) activeBadges.push('deep_focus');

            let perfectDayCompleted = false;
            daysOfWeek.forEach(day => {
                const dayTasks = state.tasks.filter(t => t.day === day.id);
                if (dayTasks.length > 0 && dayTasks.every(t => t.completed)) perfectDayCompleted = true;
            });
            if (perfectDayCompleted) activeBadges.push('perfect_day');

            const toUnlock = activeBadges.filter(b => !state.unlockedBadges.includes(b));
            toUnlock.forEach(badgeId => window.unlockBadge(badgeId));

            const toLock = state.unlockedBadges.filter(b => !activeBadges.includes(b));
            toLock.forEach(badgeId => {
                state.unlockedBadges = state.unlockedBadges.filter(b => b !== badgeId);
                const b = BADGES_DB.find(x => x.id === badgeId);
                if (b) {
                    window.showToast(`Conquista Revogada`, `Vulnerabilidade evitada: ${b.title}`, 'lock', 'text-slate-500');
                    state.xp = Math.max(0, state.xp - 100);
                    state.coins = Math.max(0, state.coins - 50);
                }
            });

            if (state.combo > (state.stats.maxComboReached || 0)) state.stats.maxComboReached = state.combo;
        };

        window.getComboMultiplier = function() { return state.combo === 0 ? 1 : 1 + (state.combo * 0.1); };
        window.breakCombo = function() {
            if (state.combo > 0) {
                state.combo = 0;
                window.showToast('Frenesi Quebrado', 'Combo zerado, mas a integridade continua ativa.', 'activity', 'text-slate-500');
            }
        };

        window.getXpForCurrentLevel = function() { return (RANKS.find(r => r.level === state.level) || RANKS[RANKS.length - 1]).max; };
        window.getRankName = function(lvl = state.level) { return (RANKS.find(r => r.level === lvl) || RANKS[RANKS.length - 1]).name; };

        window.checkLevelUp = function() {
            let nextMax = window.getXpForCurrentLevel();
            let levelChanged = false;
            while (state.xp >= nextMax && state.level < RANKS.length) {
                state.level += 1; nextMax = window.getXpForCurrentLevel(); levelChanged = true;
            }
            if (levelChanged) {
                state.energy = Math.min(100, state.energy + 50); 
                uiState.showLevelUp = true;
                setTimeout(() => { uiState.showLevelUp = false; render(); }, 4000);

        window.toggleTask = function(taskId, event) {
            const task = state.tasks.find(t => t.id == taskId);
            if (task.completed) {
                task.completed = false; task.skipped = false;
                const deductedXp = task.rewardedXp || task.xp;
                const deductedCoins = task.rewardedCoins || Math.round(task.xp * 0.2);
                state.xp = Math.max(0, state.xp - deductedXp);
                state.coins = Math.max(0, state.coins - deductedCoins);
                state.energy = Math.min(100, Math.max(0, state.energy + task.energyCost));
                state.combo = Math.max(0, state.combo - 1);
                window.spawnFloatingText(event, `-${deductedXp} XP`, 'text-red-400');
                setTimeout(() => window.spawnFloatingText(event, `-${deductedCoins} MT`, 'text-red-300'), 200);
            } else {
                if (task.subtasks && task.subtasks.some(st => !st.done)) return;
                const multiplier = window.getComboMultiplier();
                const finalXp = Math.round(task.xp * multiplier);
                const earnedCoins = Math.round(finalXp * 0.2); 
                task.completed = true; task.rewardedXp = finalXp; task.rewardedCoins = earnedCoins; 
                state.xp += finalXp; state.coins += earnedCoins;
                state.energy = Math.min(100, Math.max(0, state.energy - task.energyCost));
                state.combo += 1;
                window.spawnFloatingText(event, `+${finalXp} XP`, 'text-indigo-400');
                setTimeout(() => window.spawnFloatingText(event, `+${earnedCoins} MT`, 'text-yellow-400'), 200);

        window.calculateTaskCost = function(priority, complexity, time, impactType) {
            const prioMult = { 'essencial': 1.5, 'alta': 1.2, 'media': 1.0, 'baixa': 0.8 }[priority] || 1.0;
            const compVal = parseInt(complexity) || 1; const timeVal = parseInt(time) || 15;
            let calcXp = Math.round((20 + (compVal * 15) + (timeVal * 1.5)) * prioMult);
            let calcHp = Math.round((compVal * 5) + (timeVal * 0.4));
            if(priority === 'essencial') calcHp = Math.round(calcHp * 0.8);
            if(priority === 'baixa') calcHp = Math.round(calcHp * 1.2); 
            calcHp = Math.min(calcHp, 60);
            if (impactType === 'recharge') calcHp = -Math.round(calcHp * 0.8); 
            return { xp: calcXp, hp: calcHp };
        };

            const xpPreview = document.getElementById('ct-xp-preview');

        window.logStudySession = function() {
            const subjectId = parseInt(document.getElementById('session-subject').value);
            const type = document.getElementById('session-type').value;
            const duration = parseInt(document.getElementById('session-duration').value);
            const qTotal = parseInt(document.getElementById('session-q-total').value) || 0;
            const qCorrect = parseInt(document.getElementById('session-q-correct').value) || 0;
            const topic = document.getElementById('session-topic').value.trim();

            if (!subjectId) { window.showAlertModal('Selecione uma disciplina.'); return; }
            if (qCorrect > qTotal) { window.showAlertModal('Questões corretas não podem ser maiores que o total.'); return; }

            const sessionId = Date.now();
            const sessionDate = new Date().toISOString();

            state.studyData.sessions.push({
                id: sessionId, subjectId, type, duration, qTotal, qCorrect, topic, date: sessionDate
            });

            // Recompensa em XP pela sessão
            const xpEarned = Math.round((duration * 2) + (qCorrect * 5));
            state.xp += xpEarned;
            window.checkLevelUp();

            // Lógica Neurocientífica: Protocolo de Repetição Espaçada de Ebbinghaus
            // Se for estudo teórico, agenda revisões para 1 dia, 7 dias e 30 dias.
            if (type === 'teoria') {
                const intervals = [1, 7, 30];
                intervals.forEach(days => {
                    const dueDate = new Date();
                    dueDate.setDate(dueDate.getDate() + days);
                    state.studyData.reviews.push({
                        id: Date.now() + Math.random(),
                        sourceSessionId: sessionId,
                        subjectId: subjectId,
                        topic: topic || 'Revisão Geral',
                        dueDate: dueDate.toISOString(),
                        intervalDays: days,
                        status: 'pending' // pending, completed, missed
                    });
                });
                window.showToast('Sessão Registrada!', `+${xpEarned} XP. Protocolo de Revisão (1-7-30) ativado.`, 'brain', 'text-fuchsia-400');
            } else {
                window.showToast('Treinamento Registrado!', `+${xpEarned} XP consolidados.`, 'target', 'text-cyan-400');
            }

            window.saveState();
        };

        window.getSubjectStats = function(subjectId) {
            const sessions = state.studyData.sessions.filter(s => s.subjectId === subjectId);
            const totalTime = sessions.reduce((acc, s) => acc + s.duration, 0);
            const totalQ = sessions.reduce((acc, s) => acc + s.qTotal, 0);
            const correctQ = sessions.reduce((acc, s) => acc + s.qCorrect, 0);
            const retention = totalQ > 0 ? Math.round((correctQ / totalQ) * 100) : 0;
            return { totalTime, totalQ, correctQ, retention };
        };

                            <div class="flex overflow-x-auto scrollbar-hide gap-2 mb-6 bg-slate-950 p-1.5 rounded-xl border border-slate-800">
                                ${[
                                    {id: 'dashboard', icon: 'line-chart', label: 'Radar (Desempenho)'},
                                    {id: 'subjects', icon: 'layers', label: 'Arsenal (Disciplinas)'},
                                    {id: 'log', icon: 'crosshair', label: 'Registrar Missão'},
                                    {id: 'reviews', icon: 'rotate-cw', label: 'Protocolo Ebbinghaus'}
                                ].map(tab => `
                                    <button onclick="window.setStudyTab('${tab.id}')" class="flex items-center gap-2 px-4 py-2.5 text-xs sm:text-sm font-bold rounded-lg transition-all whitespace-nowrap ${uiState.studyTab === tab.id ? 'bg-cyan-900/40 text-cyan-300 border border-cyan-700/50 shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200 border border-transparent'}">
                                        <i data-lucide="${tab.icon}" class="w-4 h-4"></i> ${tab.label}
                                    </button>
                                `).join('')}
                            </div>
                            
                            <div class="min-h-[400px]">
                                ${renderStudyContent()}
                            </div>
                        </div>
                    </div>
                </div>`;
            }

            // RODAPÉ: BACKUP E REINICIAR
            html += `
            <div class="flex flex-wrap justify-center gap-4 pb-8 pt-4 border-t border-slate-800/50 mt-8">
                <button onclick="window.exportData()" class="text-xs text-slate-500 hover:text-emerald-400 font-bold uppercase tracking-widest transition-colors font-mono flex items-center gap-1"><i data-lucide="download" class="w-3 h-3"></i> Exportar JSON</button>
                <button onclick="window.triggerImport()" class="text-xs text-slate-500 hover:text-blue-400 font-bold uppercase tracking-widest transition-colors font-mono flex items-center gap-1"><i data-lucide="upload" class="w-3 h-3"></i> Importar JSON</button>
                <button onclick="window.resetSystem()" class="text-xs text-slate-500 hover:text-red-400 font-bold uppercase tracking-widest transition-colors font-mono flex items-center gap-1"><i data-lucide="alert-triangle" class="w-3 h-3"></i> Reiniciar Semana Total</button>
            </div>`;

            appDiv.innerHTML = html;
            lucide.createIcons();
            
            // Restaura estado dinâmico do UI sync após redesenho
            window.updateSyncStatus(currentSyncStatus);
        }

        function renderQGContent() {
            if (uiState.statsTab === 'roadmap') {
                let html = `<div class="space-y-3">`;
                RANKS.forEach(rank => {
                    const isCurrent = rank.level === state.level;
                    const isPast = rank.level < state.level;
                    const bgClass = isCurrent ? 'bg-indigo-900/40 border-indigo-500 shadow-md shadow-indigo-950/20' : (isPast ? 'bg-slate-800/50 border-slate-700 opacity-50' : 'bg-slate-900 border-slate-800');
                    html += `
                    <div class="flex items-center gap-4 p-3 rounded-xl border ${bgClass} transition-all">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center bg-slate-950 border border-slate-700 shrink-0"><i data-lucide="${isCurrent ? 'star' : (isPast ? 'check' : 'lock')}" class="w-5 h-5 ${isCurrent ? 'text-indigo-400' : 'text-slate-500'}"></i></div>
                        <div class="flex-1">
                            <h4 class="font-bold text-white text-sm sm:text-base">${rank.name} <span class="text-xs font-normal text-slate-500 ml-2">Nível ${rank.level}</span></h4>
                            <div class="text-xs text-slate-400 mt-0.5">Requisito: ${rank.max} XP</div>
                        </div>
                        ${isCurrent ? `<div class="text-xs font-black text-indigo-400 uppercase tracking-widest bg-indigo-950 px-3 py-1 rounded-full border border-indigo-900/50 animate-pulse">VOCÊ</div>` : ''}
                    </div>`;
                });
                return html + `</div>`;
            } 
            else if (uiState.statsTab === 'badges') {
                let html = `<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">`;
                BADGES_DB.forEach(badge => {
                    const unlocked = state.unlockedBadges.includes(badge.id);
                    const bgClass = unlocked ? 'bg-slate-800 border-slate-600 shadow-inner' : 'bg-slate-900/50 border-slate-800 opacity-60 grayscale';
                    html += `
                    <div class="flex items-start gap-4 p-4 rounded-xl border ${bgClass} transition-all">
                        <div class="w-12 h-12 rounded-full flex items-center justify-center bg-slate-950 border border-slate-700 shrink-0"><i data-lucide="${badge.icon}" class="w-6 h-6 ${unlocked ? badge.color : 'text-slate-600'}"></i></div>
                        <div>
                            <h4 class="font-bold text-white text-sm">${badge.title}</h4>
                            <p class="text-xs text-slate-400 mt-1 leading-tight">${badge.desc}</p>
                            ${unlocked ? `<span class="inline-block mt-2 text-[10px] uppercase font-bold text-emerald-500 bg-emerald-950 px-2 py-0.5 rounded">Ativo</span>` : `<span class="inline-block mt-2 text-[10px] uppercase font-bold text-slate-600 bg-slate-900 px-2 py-0.5 rounded">Bloqueado</span>`}
                        </div>
                    </div>`;
                });
                return html + `</div>`;
            }
            else if (uiState.statsTab === 'shop') {
                let html = `
                <div class="bg-yellow-950/20 border border-yellow-900/50 p-4 rounded-xl mb-6 flex justify-between items-center">
                    <div><h3 class="text-yellow-500 font-black uppercase text-sm">Seu Saldo</h3><p class="text-xs text-slate-400">Pague pelo seu merecido lazer acumulando moedas!</p></div>
                    <div class="text-3xl font-black text-yellow-400 flex items-center gap-2"><i data-lucide="coins"></i> ${state.coins}</div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">`;
                REWARDS_SHOP.forEach(r => {
                    const canAfford = state.coins >= r.cost;
                    html += `
                    <div class="bg-slate-800 border border-slate-700 p-4 rounded-xl flex flex-col justify-between hover:border-slate-500 transition-colors">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <i data-lucide="${r.icon}" class="text-white w-6 h-6"></i>
                                <span class="bg-slate-950 text-yellow-400 text-xs font-bold px-2 py-1 rounded border border-yellow-900/50">${r.cost} MT</span>
                            </div>
                            <h4 class="font-bold text-white text-sm">${r.title}</h4>
                            <p class="text-xs text-slate-400 mt-1 leading-tight">${r.desc}</p>
                        </div>
                        <button onclick="window.buyReward('${r.id}')" class="mt-4 w-full py-2 rounded-lg text-xs font-bold transition-colors ${canAfford ? 'bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg shadow-emerald-900/30' : 'bg-slate-900 text-slate-500 cursor-not-allowed'}">
                            ${canAfford ? 'Resgatar' : 'Faltam Moedas'}
                        </button>
                    </div>`;
                });
                return html + `</div>`;
            }
            return '';
        }

        // RENDERIZAÇÃO DO CONTEÚDO DE ESTUDOS
        function renderStudyContent() {
            if (uiState.studyTab === 'dashboard') {
                const totalSessions = state.studyData.sessions.length;
                const totalMinutes = state.studyData.sessions.reduce((acc, s) => acc + s.duration, 0);
                const totalHours = (totalMinutes / 60).toFixed(1);
                const totalQ = state.studyData.sessions.reduce((acc, s) => acc + s.qTotal, 0);
                const correctQ = state.studyData.sessions.reduce((acc, s) => acc + s.qCorrect, 0);
                const globalRetention = totalQ > 0 ? Math.round((correctQ / totalQ) * 100) : 0;

                let html = `
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl flex flex-col items-center justify-center text-center">
                        <i data-lucide="clock" class="text-indigo-400 mb-2 w-6 h-6"></i>
                        <span class="text-2xl font-black text-white">${totalHours}h</span>
                        <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1">Tempo Total</span>
                    </div>
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl flex flex-col items-center justify-center text-center">
                        <i data-lucide="target" class="text-cyan-400 mb-2 w-6 h-6"></i>
                        <span class="text-2xl font-black text-white">${totalQ}</span>
                        <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1">Questões Feitas</span>
                    </div>
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl flex flex-col items-center justify-center text-center relative overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-t from-emerald-900/20 to-transparent"></div>
                        <i data-lucide="percent" class="text-emerald-400 mb-2 w-6 h-6 relative z-10"></i>
                        <span class="text-2xl font-black text-white relative z-10">${globalRetention}%</span>
                        <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1 relative z-10">Retenção (Active Recall)</span>
                    </div>
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl flex flex-col items-center justify-center text-center">
                        <i data-lucide="zap" class="text-yellow-400 mb-2 w-6 h-6"></i>
                        <span class="text-2xl font-black text-white">${totalSessions}</span>
                        <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mt-1">Sessões Táticas</span>
                    </div>
                </div>

                <h3 class="text-sm font-bold text-slate-300 mb-4 flex items-center gap-2 uppercase tracking-widest"><i data-lucide="bar-chart-2" class="text-cyan-500"></i> Eficiência por Disciplina</h3>
                <div class="space-y-4">`;

                if (state.studyData.subjects.length === 0) {
                    html += `<p class="text-slate-500 text-sm italic text-center p-8 bg-slate-950 rounded-xl border border-slate-800">Seu arsenal está vazio. Adicione disciplinas para visualizar as estatísticas.</p>`;
                }

                state.studyData.subjects.forEach(sub => {
                    const stats = window.getSubjectStats(sub.id);
                    const retentionColor = stats.retention >= 80 ? 'bg-emerald-500' : (stats.retention >= 60 ? 'bg-yellow-500' : 'bg-red-500');
                    
                    html += `
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl">
                        <div class="flex justify-between items-end mb-2">
                            <div class="flex items-center gap-2">
                                <div class="w-3 h-3 rounded-full ${sub.color}"></div>
                                <span class="font-bold text-white text-sm">${sub.name}</span>
                            </div>
                            <span class="text-xs font-bold text-slate-400">${(stats.totalTime / 60).toFixed(1)}h estudadas</span>
                        </div>
                        <div class="flex items-center gap-4 mt-3">
                            <div class="flex-1">
                                <div class="flex justify-between text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wider">
                                    <span>Retenção Neural</span>
                                    <span class="${stats.retention >= 80 ? 'text-emerald-400' : 'text-slate-400'}">${stats.retention}% (${stats.correctQ}/${stats.totalQ})</span>
                                </div>
                                <div class="w-full bg-slate-900 rounded-full h-2 border border-slate-800 overflow-hidden">
                                    <div class="${retentionColor} h-2 rounded-full transition-all" style="width: ${stats.retention}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>`;
                });

                html += `</div>
                <div class="mt-6 bg-cyan-950/20 border border-cyan-900/30 p-4 rounded-xl text-xs text-cyan-500 leading-relaxed">
                    <strong class="text-cyan-400">Nota Neuropsicopedagógica:</strong> Manter uma taxa de retenção acima de 80% indica consolidação eficaz na memória de longo prazo. Se uma disciplina estiver abaixo de 60%, reduza a carga teórica e aumente a resolução de questões focadas (Evocação Ativa).
                </div>`;
                return html;
            } 
            else if (uiState.studyTab === 'subjects') {
                let html = `
                <div class="bg-slate-950 border border-slate-800 p-5 rounded-xl mb-6">
                    <h3 class="text-sm font-bold text-slate-300 mb-4 flex items-center gap-2"><i data-lucide="plus-square" class="text-emerald-400"></i> Adicionar ao Edital / Ciclo</h3>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input type="text" id="new-subject-name" placeholder="Ex: Direito Constitucional, Inglês..." class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:border-cyan-500">
                        <select id="new-subject-color" class="bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-sm text-slate-300 focus:outline-none">
                            <option value="bg-cyan-500" class="text-cyan-500 font-bold">Ciano</option>
                            <option value="bg-indigo-500" class="text-indigo-500 font-bold">Índigo</option>
                            <option value="bg-emerald-500" class="text-emerald-500 font-bold">Esmeralda</option>
                            <option value="bg-rose-500" class="text-rose-500 font-bold">Rosa</option>
                            <option value="bg-yellow-500" class="text-yellow-500 font-bold">Amarelo</option>
                            <option value="bg-fuchsia-500" class="text-fuchsia-500 font-bold">Fúcsia</option>
                        </select>
                        <button onclick="window.addSubject()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2 px-6 rounded-lg transition-colors">Cadastrar</button>
                    </div>
                </div>

                <h3 class="text-sm font-bold text-slate-300 mb-3 uppercase tracking-widest text-xs">Disciplinas Ativas</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">`;

                if (state.studyData.subjects.length === 0) {
                    html += `<div class="col-span-full text-center text-slate-500 p-4 italic text-sm">Nenhuma disciplina cadastrada.</div>`;
                }

                state.studyData.subjects.forEach(sub => {
                    html += `
                    <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl flex justify-between items-center group hover:border-slate-600 transition-colors">
                        <div class="flex items-center gap-3">
                            <div class="w-4 h-4 rounded-full ${sub.color} shadow-[0_0_10px_currentColor] opacity-80"></div>
                            <span class="font-bold text-white">${sub.name}</span>
                        </div>
                        <button onclick="window.deleteSubject(${sub.id})" class="text-slate-600 hover:text-red-400 p-2 rounded-lg hover:bg-slate-900 transition-colors opacity-0 group-hover:opacity-100">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>`;
                });
                return html + `</div>`;
            }
            else if (uiState.studyTab === 'log') {
                if (state.studyData.subjects.length === 0) {
                    return `<div class="text-center p-8 text-slate-400">Adicione disciplinas na aba "Arsenal" antes de registrar uma sessão.</div>`;
                }

                let html = `
                <div class="bg-slate-950 border border-slate-800 rounded-xl p-5 sm:p-6 max-w-2xl mx-auto">
                    <p class="text-xs text-slate-400 mb-6 leading-relaxed">Registrar o que você estudou alimenta os gráficos de inteligência e <strong class="text-fuchsia-400">programa automaticamente o seu algoritmo de repetição espaçada.</strong></p>
                    
                    <div class="space-y-5">
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest block mb-2">Disciplina Alvo</label>
                            <select id="session-subject" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-500">
                                <option value="" disabled selected>Selecione a disciplina...</option>
                                ${state.studyData.subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
                            </select>
                        </div>

                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest block mb-2">Assunto / Tópico Específico</label>
                            <input type="text" id="session-topic" placeholder="Ex: Direitos Políticos, Verbo To Be..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-500">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest block mb-2">Modo de Operação</label>
                                <select id="session-type" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-500">
                                    <option value="teoria">Teoria (Gera Revisões Automáticas)</option>
                                    <option value="revisao">Revisão Ativa</option>
                                    <option value="questoes">Bateria de Questões</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-xs font-bold text-slate-500 uppercase tracking-widest block mb-2">Tempo (Minutos)</label>
                                <input type="number" id="session-duration" value="60" min="5" step="5" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-500">
                            </div>
                        </div>

                        <div class="bg-indigo-950/20 border border-indigo-900/30 p-4 rounded-xl mt-4">
                            <label class="text-xs font-bold text-indigo-400 uppercase tracking-widest block mb-3 flex items-center gap-2"><i data-lucide="target" class="w-4 h-4"></i> Testagem Ativa (Metacognição)</label>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Total de Questões</label>
                                    <input type="number" id="session-q-total" value="0" min="0" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-indigo-500">
                                </div>
                                <div>
                                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Acertos</label>
                                    <input type="number" id="session-q-correct" value="0" min="0" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-emerald-500">
                                </div>
                            </div>
                        </div>

                        <button onclick="window.logStudySession()" class="w-full bg-cyan-700 hover:bg-cyan-600 text-white font-black uppercase tracking-widest py-4 rounded-xl mt-4 shadow-[0_0_15px_rgba(8,145,178,0.3)] transition-all">Registrar Inteligência Coletada</button>
                    </div>
                </div>`;
                return html;
            }
            else if (uiState.studyTab === 'reviews') {
                const now = new Date();
                
                // Limpeza: remove revisões de disciplinas que foram apagadas
                state.studyData.reviews = state.studyData.reviews.filter(r => state.studyData.subjects.some(s => s.id === r.subjectId));

                const pendingReviews = state.studyData.reviews.filter(r => r.status === 'pending');
                pendingReviews.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate));

                const dueTodayOrPast = pendingReviews.filter(r => new Date(r.dueDate) <= now);
                const upcoming = pendingReviews.filter(r => new Date(r.dueDate) > now);

                let html = `
                <div class="bg-fuchsia-950/20 border border-fuchsia-900/30 p-4 rounded-xl mb-6">
                    <h3 class="text-fuchsia-400 font-black uppercase text-sm flex items-center gap-2 mb-2"><i data-lucide="brain-cog"></i> Curva de Esquecimento de Ebbinghaus</h3>
                    <p class="text-xs text-slate-400 leading-relaxed">Para fixar um dado na memória de longo prazo, seu cérebro precisa ser relembrado na iminência de esquecê-lo. O algoritmo age nos dias 1, 7 e 30 após o contato inicial.</p>
                </div>`;

                if (pendingReviews.length === 0) {
                    return html + `<div class="text-center p-12 text-slate-500 border border-dashed border-slate-700 rounded-xl bg-slate-950/50">Nenhuma revisão pendente detectada no radar neural. Vá estudar teorias para alimentar o sistema.</div>`;
                }

                html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;

                // Coluna: Ação Imediata
                html += `<div><h4 class="text-xs font-bold text-red-400 uppercase tracking-widest mb-3 flex items-center gap-2"><i data-lucide="alert-circle" class="w-4 h-4"></i> Ação Imediata (${dueTodayOrPast.length})</h4><div class="space-y-3">`;
                if (dueTodayOrPast.length === 0) { html += `<p class="text-xs text-slate-600 italic">Limpo por hoje.</p>`; }
                dueTodayOrPast.forEach(r => {
                    const subject = state.studyData.subjects.find(s => s.id === r.subjectId);
                    if(!subject) return;
                    html += `
                    <div class="bg-slate-950 border border-red-900/30 p-3 rounded-lg flex justify-between items-center group">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[9px] uppercase font-bold bg-red-950 text-red-400 px-1.5 py-0.5 rounded border border-red-900/50">Atrasado / Hoje</span>
                                <span class="text-[9px] uppercase font-bold bg-slate-800 text-slate-300 px-1.5 py-0.5 rounded">+${r.intervalDays} Dias</span>
                            </div>
                            <div class="font-bold text-sm text-white flex items-center gap-1.5"><div class="w-2 h-2 rounded-full ${subject.color}"></div> ${subject.name}</div>
                            <div class="text-xs text-slate-400 truncate max-w-[200px] mt-0.5">${r.topic}</div>
                        </div>
                        <button onclick="window.completeReview(${r.id})" class="bg-emerald-900/30 hover:bg-emerald-600 text-emerald-500 hover:text-white border border-emerald-800/50 p-2 rounded-lg transition-all" title="Marcar Revisão como Concluída"><i data-lucide="check" class="w-4 h-4"></i></button>
                    </div>`;
                });
                html += `</div></div>`;

                // Coluna: Radar Futuro
                html += `<div><h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-2"><i data-lucide="calendar" class="w-4 h-4"></i> Próximos Dias (${upcoming.length})</h4><div class="space-y-3">`;
                if (upcoming.length === 0) { html += `<p class="text-xs text-slate-600 italic">Nada no radar recente.</p>`; }
                upcoming.slice(0, 10).forEach(r => { // Mostra só os próximos 10
                    const subject = state.studyData.subjects.find(s => s.id === r.subjectId);
                    if(!subject) return;
                    const dateStr = new Date(r.dueDate).toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'});
                    html += `
                    <div class="bg-slate-950/50 border border-slate-800/50 p-3 rounded-lg opacity-70">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[9px] uppercase font-bold bg-slate-900 text-slate-500 px-1.5 py-0.5 rounded border border-slate-800">Para: ${dateStr}</span>
                            <span class="text-[9px] uppercase font-bold bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded">+${r.intervalDays} Dias</span>
                        </div>
                        <div class="font-bold text-sm text-slate-300 flex items-center gap-1.5"><div class="w-2 h-2 rounded-full ${subject.color}"></div> ${subject.name}</div>
                        <div class="text-xs text-slate-500 truncate mt-0.5">${r.topic}</div>
                    </div>`;
                });
                html += `</div></div>`;

                html += `</div>`;
                return html;
            }
            return '';
        }

        // Setup Inicial de Ícones para a tela de Login
        lucide.createIcons();

    </script>
</body>
</html>
