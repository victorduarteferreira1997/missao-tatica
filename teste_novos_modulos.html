                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Categoria</label><select id="var-cat" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-xs text-white outline-none"><option>Alimentação fora</option><option>Mercado</option><option>Transporte</option><option>Saúde</option><option>Lazer</option><option>Roupas</option><option>Tecnologia</option><option>Educação</option><option>Outro</option></select></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase text-fuchsia-400">Gatilho Psi</label><select id="var-trigger" class="w-full bg-slate-900 border border-fuchsia-900/50 rounded-lg p-2.5 text-xs text-fuchsia-100 outline-none"><option>Necessidade real</option><option>Planejado</option><option class="text-red-400">Ansiedade</option><option class="text-red-400">Cansaço</option><option class="text-red-400">Recompensa</option><option class="text-red-400">Impulso</option><option>Tédio</option></select></div>
                    </div>
                    <button onclick="window.tryAddVariableExpense()" class="w-full bg-yellow-900/50 hover:bg-yellow-800 text-yellow-400 font-bold py-2.5 rounded-lg border border-yellow-700/50 text-xs transition-colors">Debitar Fundo Tático</button>
                </div>
                <div class="space-y-2">`;
                state.financeData.variableExpenses.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(v => {
                    html += `<div class="bg-slate-950 border border-slate-800 p-3 rounded-lg flex justify-between items-center group"><div class="flex flex-col"><span class="text-[9px] uppercase font-bold text-slate-500 mb-0.5">${new Date(v.date).toLocaleDateString()} | ${v.trigger}</span><span class="text-sm font-bold text-white">${v.description}</span></div><div class="flex items-center gap-3"><span class="text-xs text-orange-400 font-bold">R$${v.amount.toFixed(2)}</span><button onclick="window.deleteVariable(${v.id})" class="text-slate-600 hover:text-red-400 opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`;
                });
                return html + `</div>`;
            }
            else if(uiState.financeTab === 'fixas') {
                let html = `
                <div class="bg-slate-950 border border-slate-800 p-5 rounded-xl mb-6 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Conta / Dívida</label><input type="text" id="fix-desc" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-xs text-white outline-none"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Valor (R$)</label><input type="number" id="fix-amount" step="0.01" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-xs text-white outline-none"></div>
                    </div>
                    <div><label class="text-[10px] font-bold text-slate-500 uppercase">Categoria</label><select id="fix-cat" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-xs text-white outline-none"><option>Moradia</option><option>Água/Luz/Internet</option><option>Saúde</option><option>Educação</option><option>Assinaturas</option><option>Dívidas</option><option>Outro</option></select></div>
                    <button onclick="window.addFixedExpense()" class="w-full bg-blue-900/50 hover:bg-blue-800 text-blue-300 font-bold py-2.5 rounded-lg border border-blue-700/50 text-xs transition-colors">Adicionar Custo Fixo</button>
                </div><div class="space-y-2">`;
                state.financeData.fixedExpenses.forEach(f => {
                    const paidStyle = f.paid ? 'opacity-50 line-through' : '';
                    html += `<div class="bg-slate-950 border border-slate-800 p-3 rounded-lg flex justify-between items-center group"><div class="flex items-center gap-3"><button onclick="window.toggleFixedPaid(${f.id})"><i data-lucide="${f.paid?'check-circle':'circle'}" class="w-5 h-5 ${f.paid?'text-emerald-500':'text-slate-600'}"></i></button><div class="flex flex-col ${paidStyle}"><span class="text-sm font-bold text-white">${f.description}</span></div></div><div class="flex items-center gap-3"><span class="text-xs text-blue-400 font-bold ${paidStyle}">R$${f.amount.toFixed(2)}</span><button onclick="window.deleteFixed(${f.id})" class="text-slate-600 hover:text-red-400 opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`;
                });
                return html + `</div>`;
            }
            else if(uiState.financeTab === 'receitas') {
                let html = `
                <div class="bg-slate-950 border border-slate-800 p-5 rounded-xl mb-6 space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Origem</label><input type="text" id="inc-desc" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-xs text-white outline-none"></div>
                        <div><label class="text-[10px] font-bold text-slate-500 uppercase">Valor (R$)</label><input type="number" id="inc-amount" step="0.01" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-xs text-white outline-none"></div>
                    </div>
                    <div><label class="text-[10px] font-bold text-slate-500 uppercase">Categoria</label><select id="inc-cat" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-xs text-white outline-none"><option>Salário</option><option>Consultoria / PJ</option><option>Extra</option><option>Outro</option></select></div>
                    <button onclick="window.addIncome()" class="w-full bg-emerald-900/50 hover:bg-emerald-800 text-emerald-400 font-bold py-2.5 rounded-lg border border-emerald-700/50 text-xs transition-colors">Injetar Capital</button>
                </div><div class="space-y-2">`;
                state.financeData.incomes.forEach(i => {
                    html += `<div class="bg-slate-950 border border-slate-800 p-3 rounded-lg flex justify-between items-center group"><div class="flex flex-col"><span class="text-sm font-bold text-white">${i.description}</span></div><div class="flex items-center gap-3"><span class="text-xs text-emerald-400 font-bold">R$${i.amount.toFixed(2)}</span><button onclick="window.deleteIncome(${i.id})" class="text-slate-600 hover:text-red-400 opacity-0 group-hover:opacity-100"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`;
                });
                return html + `</div>`;
            }
            else if(uiState.financeTab === 'diario') {
                let html = `
                <div class="bg-slate-950 border border-slate-800 p-5 rounded-xl mb-6">
                    <h3 class="text-sm font-bold text-slate-300 mb-3"><i data-lucide="book-open" class="inline w-4 h-4 text-fuchsia-400 mr-2"></i>Journal Financeiro</h3>
                    <div class="space-y-3">
                        <select id="mj-mood" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-xs text-white outline-none"><option>Ansioso com contas</option><option>Confiante</option><option>Frustrado com gastos</option><option>Calmo</option></select>
                        <input type="text" id="mj-event" placeholder="Evento (Ex: Paguei fatura alta, Vontade de comprar X)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-xs text-white outline-none">
                        <textarea id="mj-thought" placeholder="O que pensou/sentiu?" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-xs text-white outline-none h-16"></textarea>
                        <button onclick="window.logMoneyJournal()" class="w-full bg-fuchsia-900/50 hover:bg-fuchsia-800 text-fuchsia-300 font-bold py-2 rounded-lg border border-fuchsia-700/50 text-xs">Registrar Reflexão (+15 XP)</button>
                    </div>
                </div><div class="space-y-3">`;
                state.financeData.moneyJournal.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(m => {
                    html += `<div class="bg-slate-950 border border-slate-800 p-4 rounded-xl"><div class="flex items-center gap-2 mb-2"><span class="text-[9px] uppercase font-bold text-slate-500">${new Date(m.date).toLocaleDateString()}</span><span class="text-[9px] uppercase font-bold bg-slate-900 text-slate-300 px-1.5 py-0.5 rounded border border-slate-700">${m.mood}</span></div><h4 class="font-bold text-white text-sm mb-1">${m.event}</h4>${m.action ? `<p class="text-[10px] text-emerald-400 font-bold mb-1 uppercase">Ação: ${m.action}</p>`:''}<p class="text-xs text-slate-400">${m.thought}</p></div>`;
                });
                return html + `</div>`;
            }
            return '';
        }

    </script>
</body>
</html>
